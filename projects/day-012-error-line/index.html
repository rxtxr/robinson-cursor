<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Error Line — Spray Paint Canvas</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #fff; }
  canvas { display: block; cursor: crosshair; touch-action: none; }
  #ui {
    position: fixed; bottom: 0; left: 0; right: 0;
    display: flex; flex-wrap: wrap; gap: 10px; padding: 12px 16px;
    background: rgba(255,255,255,0.92); backdrop-filter: blur(8px);
    border-top: 1px solid #ddd; align-items: flex-end; z-index: 10;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  #ui label { font-size: 12px; color: #666; display: block; margin-bottom: 4px; }
  #ui button {
    padding: 5px 12px; font-size: 12px; border-radius: 6px;
    border: 1px solid #ccc; background: #fff; color: #333; cursor: pointer;
  }
  #ui button:hover { background: #f0f0f0; }
  #ui button.active { background: #e0e0e0; }
  #ui button:disabled { opacity: 0.3; cursor: default; }
  .row { display: flex; gap: 8px; align-items: center; }
  .slider-group { flex: 1; min-width: 90px; }
  .slider-group input { width: 100%; }
  #capPicker, #colorPicker { display: flex; gap: 5px; flex-wrap: wrap; }
  #stats { font-size: 11px; color: #999; display: flex; gap: 12px; flex-wrap: wrap; }
</style>
</head>
<body>

<canvas id="c"></canvas>

<div id="ui">
  <div style="width:100%;">
    <label>Cap</label>
    <div id="capPicker"></div>
  </div>
  <div class="row" style="width:100%;">
    <label>Color</label>
    <div id="colorPicker"></div>
  </div>
  <div class="slider-group">
    <label>Pressure <span id="pV">4</span> bar</label>
    <input type="range" id="pressure" min="1" max="6" value="4" step="1">
  </div>
  <div class="slider-group">
    <label>Distance <span id="dV">15</span> cm</label>
    <input type="range" id="dist" min="3" max="40" value="15" step="1">
  </div>
  <div class="slider-group">
    <label>Opacity <span id="oV">85</span>%</label>
    <input type="range" id="opac" min="20" max="100" value="85" step="5">
  </div>
  <div class="slider-group">
    <label>Sharpness <span id="shV">50</span>%</label>
    <input type="range" id="sharp" min="0" max="100" value="50" step="5">
  </div>
  <div class="row">
    <button id="undoBtn" disabled title="Undo (Ctrl+Z)">&#8592; Undo</button>
    <button id="redoBtn" disabled title="Redo (Ctrl+Y)">Redo &#8594;</button>
    <button id="clearBtn">Clear</button>
  </div>
  <div id="stats">
    <span id="sV">Speed &ndash;</span>
    <span id="sF">Flow &ndash;</span>
    <span id="sS">Spot &ndash;</span>
    <span id="sD">0 drips</span>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const CELL = 10;

const CAPS = [
  { id:'skinny',   label:'Skinny',    baseR:6,   sharp:0.80, fringe:0.14, scatter:0.3, sMax:0.8, flow:0.65, dripT:320, clog:false },
  { id:'std',      label:'Standard',  baseR:16,  sharp:0.68, fringe:0.18, scatter:0.9, sMax:1.4, flow:1.00, dripT:230, clog:false },
  { id:'fat',      label:'Fat Cap',   baseR:36,  sharp:0.60, fringe:0.22, scatter:1.6, sMax:2.0, flow:2.10, dripT:115, clog:false },
  { id:'superfat', label:'Super Fat', baseR:60,  sharp:0.52, fringe:0.26, scatter:2.5, sMax:2.8, flow:3.20, dripT:65,  clog:false },
  { id:'clog',     label:'Clogged',   baseR:16,  sharp:0.50, fringe:0.20, scatter:0,   sMax:0,   flow:0.30, dripT:480, clog:true  },
];

let cap = CAPS[1];
let color = '#e8192c';
let clogA = Math.random() * Math.PI * 2;
let painting = false, vel = 0, lastX = null, lastY = null, lastT = null;
let drips = [], accumData, accumW, accumH, pending = [];

let undoStack = [];
let redoStack = [];
const MAX_UNDO = 40;

function saveSnapshot() {
  const img = ctx.getImageData(0, 0, canvas.width, canvas.height);
  undoStack.push({ img, accum: new Float32Array(accumData) });
  if (undoStack.length > MAX_UNDO) undoStack.shift();
  redoStack = [];
  updateUndoButtons();
}

function undo() {
  if (undoStack.length === 0) return;
  redoStack.push({
    img: ctx.getImageData(0, 0, canvas.width, canvas.height),
    accum: new Float32Array(accumData)
  });
  const state = undoStack.pop();
  ctx.putImageData(state.img, 0, 0);
  accumData.set(state.accum);
  drips = [];
  updateUndoButtons();
}

function redo() {
  if (redoStack.length === 0) return;
  undoStack.push({
    img: ctx.getImageData(0, 0, canvas.width, canvas.height),
    accum: new Float32Array(accumData)
  });
  const state = redoStack.pop();
  ctx.putImageData(state.img, 0, 0);
  accumData.set(state.accum);
  drips = [];
  updateUndoButtons();
}

function updateUndoButtons() {
  document.getElementById('undoBtn').disabled = undoStack.length === 0;
  document.getElementById('redoBtn').disabled = redoStack.length === 0;
}

const COLORS = ['#e8192c','#0057ff','#00c853','#ff8c00','#ffe000','#cc00cc','#ffffff','#111111'];

function hexRgb(h) { return { r: parseInt(h.slice(1,3),16), g: parseInt(h.slice(3,5),16), b: parseInt(h.slice(5,7),16) }; }
function getP() { return +document.getElementById('pressure').value; }
function getD() { return +document.getElementById('dist').value; }
function getO() { return +document.getElementById('opac').value / 100; }
function getSh() { return +document.getElementById('sharp').value / 100; }
function spotR() { return Math.max(3, cap.baseR * (getD() / 15)); }

function resize() {
  const W = window.innerWidth, H = window.innerHeight;
  let oldImg = null;
  if (canvas.width > 0 && canvas.height > 0) {
    oldImg = ctx.getImageData(0, 0, canvas.width, canvas.height);
  }
  canvas.width = W; canvas.height = H;
  ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, W, H);
  if (oldImg) ctx.putImageData(oldImg, 0, 0);
  accumW = Math.ceil(W / CELL); accumH = Math.ceil(H / CELL);
  accumData = new Float32Array(accumW * accumH);
  drips = [];
  undoStack = []; redoStack = [];
  updateUndoButtons();
}

function addAccum(x, y, amt) {
  const gx = Math.min(accumW-1, Math.max(0, Math.floor(x/CELL)));
  const gy = Math.min(accumH-1, Math.max(0, Math.floor(y/CELL)));
  const i = gy * accumW + gx;
  accumData[i] += amt;
  if (accumData[i] > cap.dripT && drips.length < 100) {
    accumData[i] *= 0.1;
    spawnDrip(x, y);
  }
}

function spawnDrip(x, y) {
  const p = getP();
  drips.push({ x: x + (Math.random()-0.5)*3, y, prevY: y, vy: 0.28 + Math.random()*0.4,
    w: 0.9 + p*0.20 + Math.random()*1.2, rgb: hexRgb(color), alive: true });
}

function updateDrips() {
  let alive = 0; ctx.lineCap = 'round';
  for (let i = drips.length-1; i >= 0; i--) {
    const d = drips[i]; if (!d.alive) continue;
    d.vy = Math.min(d.vy * 1.006, 4); d.y += d.vy;
    const { r, g, b } = d.rgb;
    ctx.beginPath(); ctx.moveTo(d.x, d.prevY); ctx.lineTo(d.x, d.y);
    ctx.strokeStyle = `rgba(${r},${g},${b},0.94)`; ctx.lineWidth = d.w; ctx.stroke();
    ctx.beginPath(); ctx.arc(d.x, d.y, d.w*1.55, 0, Math.PI*2);
    ctx.fillStyle = `rgba(${r},${g},${b},0.97)`; ctx.fill();
    d.prevY = d.y;
    if (d.y > canvas.height + 20) d.alive = false; else alive++;
  }
  document.getElementById('sD').textContent = alive + ' drips';
}

function sprayAt(x, y) {
  const p = getP(), dist = getD(), op = getO();
  const R = spotR();
  const speedF = 1 / (1 + vel * 4.5);
  const paintF = Math.min(1, cap.flow * speedF);
  const { r, g, b } = hexRgb(color);
  const ra = `${r},${g},${b}`;
  const alpha = Math.min(0.96, op * Math.min(1.3, p / (dist * 0.16)) * paintF);
  const sh = getSh();
  const edgePos = 0.10 + sh * 0.85;
  const fringeEnd = Math.min(1.0, edgePos + (1.0 - edgePos) * (1.0 - sh * 0.7));

  if (cap.clog) {
    ctx.save();
    ctx.translate(x, y); ctx.rotate(clogA); ctx.scale(2.5, 0.32);
    const gC = ctx.createRadialGradient(0,0,0, 0,0,R);
    gC.addColorStop(0,         `rgba(${ra},${alpha.toFixed(3)})`);
    gC.addColorStop(edgePos,   `rgba(${ra},${alpha.toFixed(3)})`);
    gC.addColorStop(fringeEnd, `rgba(${ra},0)`);
    ctx.fillStyle = gC; ctx.beginPath(); ctx.arc(0,0,R,0,Math.PI*2); ctx.fill();
    ctx.restore();
    for (let i = 0; i < 2 + Math.round(Math.random()*2); i++) {
      const a2 = clogA + (Math.random()-0.5)*1.2, rd = R * (0.3 + Math.random()*1.1);
      const bx = x + Math.cos(a2)*rd, by = y + Math.sin(a2)*rd;
      const sz = 4 + Math.random()*11;
      ctx.beginPath(); ctx.arc(bx, by, sz, 0, Math.PI*2);
      ctx.fillStyle = `rgba(${ra},${(alpha*(0.6+Math.random()*0.35)).toFixed(3)})`; ctx.fill();
    }
    addAccum(x, y, cap.flow * speedF);
    return;
  }

  const gR = ctx.createRadialGradient(x,y,0, x,y,R);
  gR.addColorStop(0,               `rgba(${ra},${alpha.toFixed(3)})`);
  gR.addColorStop(edgePos,         `rgba(${ra},${alpha.toFixed(3)})`);
  gR.addColorStop(edgePos+0.001,   `rgba(${ra},${(alpha*0.55).toFixed(3)})`);
  gR.addColorStop(fringeEnd*0.88,  `rgba(${ra},${(alpha*0.10).toFixed(3)})`);
  gR.addColorStop(Math.min(1,fringeEnd), `rgba(${ra},0)`);
  ctx.fillStyle = gR;
  ctx.beginPath(); ctx.arc(x,y,R,0,Math.PI*2); ctx.fill();

  if (cap.scatter > 0 && alpha > 0.05) {
    const nSc = Math.round(cap.scatter * Math.sqrt(p) * speedF * 2.0);
    for (let i = 0; i < nSc; i++) {
      const ang = Math.random() * Math.PI * 2;
      const rv = edgePos + Math.random() * (fringeEnd - edgePos + 0.18);
      if (rv > 1.25) continue;
      const sx = x + Math.cos(ang)*R*rv, sy = y + Math.sin(ang)*R*rv;
      const fall = Math.max(0, 1 - (rv - edgePos) / (fringeEnd - edgePos + 0.01));
      const sa = alpha * fall * 0.09;
      const sz = 0.3 + Math.random() * cap.sMax;
      ctx.beginPath(); ctx.arc(sx, sy, sz, 0, Math.PI*2);
      ctx.fillStyle = `rgba(${ra},${Math.min(0.22, sa).toFixed(3)})`; ctx.fill();
    }
  }

  addAccum(x, y, cap.flow * speedF * 1.0);
  document.getElementById('sV').textContent = `Speed ${Math.round(vel*1000)} px/s`;
  document.getElementById('sF').textContent = `Flow ${Math.round(paintF*100)}%`;
  document.getElementById('sS').textContent = `Spot ${(R*2/5).toFixed(0)} cm`;
}

function loop() {
  for (const pt of pending) sprayAt(pt.x, pt.y);
  pending = [];
  updateDrips();
  requestAnimationFrame(loop);
}

function pushPts(x, y) {
  if (lastX === null) { pending.push({x, y}); return; }
  const steps = Math.max(1, Math.round(Math.hypot(x-lastX, y-lastY) / 3));
  for (let i = 1; i <= steps; i++) pending.push({ x: lastX + (x-lastX)*i/steps, y: lastY + (y-lastY)*i/steps });
}

function updV(x, y) {
  const now = performance.now();
  if (lastX !== null && lastT !== null) {
    const d = Math.hypot(x-lastX, y-lastY), dt = Math.max(1, now - lastT);
    vel = vel * 0.6 + (d/dt) * 0.4;
  }
  lastX = x; lastY = y; lastT = now;
}

canvas.addEventListener('mousedown', e => {
  if (e.target !== canvas) return;
  saveSnapshot();
  painting = true; vel = 0;
  const r = canvas.getBoundingClientRect();
  lastX = e.clientX - r.left; lastY = e.clientY - r.top; lastT = performance.now();
  pending.push({ x: lastX, y: lastY });
});
canvas.addEventListener('mousemove', e => {
  if (!painting) return;
  const r = canvas.getBoundingClientRect(), x = e.clientX - r.left, y = e.clientY - r.top;
  pushPts(x, y); updV(x, y);
});
window.addEventListener('mouseup', () => { painting = false; lastX = null; lastY = null; vel = 0; });

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  saveSnapshot();
  painting = true; vel = 0;
  const r = canvas.getBoundingClientRect(), t = e.touches[0];
  lastX = t.clientX - r.left; lastY = t.clientY - r.top; lastT = performance.now();
  pending.push({ x: lastX, y: lastY });
}, { passive: false });
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (!painting) return;
  const r = canvas.getBoundingClientRect(), t = e.touches[0], x = t.clientX - r.left, y = t.clientY - r.top;
  pushPts(x, y); updV(x, y);
}, { passive: false });
window.addEventListener('touchend', () => { painting = false; lastX = null; lastY = null; vel = 0; });

window.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) { e.preventDefault(); undo(); }
  if ((e.ctrlKey || e.metaKey) && (e.key === 'y' || (e.key === 'z' && e.shiftKey))) { e.preventDefault(); redo(); }
});

document.getElementById('undoBtn').addEventListener('click', undo);
document.getElementById('redoBtn').addEventListener('click', redo);

const cpEl = document.getElementById('capPicker');
CAPS.forEach(c => {
  const btn = document.createElement('button'); btn.textContent = c.label;
  if (c.id === cap.id) btn.classList.add('active');
  btn.addEventListener('click', () => {
    cap = c; clogA = Math.random() * Math.PI * 2;
    document.querySelectorAll('#capPicker button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });
  cpEl.appendChild(btn);
});

const clEl = document.getElementById('colorPicker');
COLORS.forEach(hex => {
  const btn = document.createElement('button');
  btn.style.cssText = `width:22px;height:22px;border-radius:50%;background:${hex};border:2px solid ${hex==='#ffffff'?'#ccc':'transparent'};cursor:pointer;padding:0;`;
  if (hex === color) { btn.style.outline = '2px solid #333'; btn.style.outlineOffset = '2px'; }
  btn.addEventListener('click', () => {
    document.querySelectorAll('#colorPicker button').forEach(b => b.style.outline = 'none');
    btn.style.outline = '2px solid #333'; btn.style.outlineOffset = '2px';
    color = hex;
  });
  clEl.appendChild(btn);
});

[['pressure','pV'],['dist','dV'],['opac','oV'],['sharp','shV']].forEach(([id, out]) => {
  document.getElementById(id).addEventListener('input', e => document.getElementById(out).textContent = e.target.value);
});

document.getElementById('clearBtn').addEventListener('click', () => {
  saveSnapshot();
  ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, canvas.width, canvas.height);
  accumData.fill(0); drips = [];
});

resize();
window.addEventListener('resize', resize);
loop();
</script>
</body>
</html>
