<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>visualAIzer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="glCanvas"></canvas>
  <div id="threeContainer"></div>

  <div id="ui">
    <div id="player">
      <div id="trackInfo">
        <span id="trackTitle">No track loaded</span>
        <span id="trackArtist"></span>
      </div>
      <div id="transport">
        <button id="prevBtn" title="Previous">&#9664;&#9664;</button>
        <button id="playBtn" title="Play">&#9654;</button>
        <button id="nextBtn" title="Next">&#9654;&#9654;</button>
        <div id="timeDisplay">
          <span id="timeCurrent">0:00</span>
          <input type="range" id="seekBar" min="0" max="100" value="0" step="0.1">
          <span id="timeDuration">0:00</span>
        </div>
        <input type="range" id="volumeBar" min="0" max="1" step="0.01" value="0.8" title="Volume">
      </div>
      <div id="dropHint">Drop audio files here or <label id="fileLabel">browse<input type="file" id="fileInput" accept="audio/*" multiple hidden></label></div>
    </div>
    <div id="sceneIndicator"></div>
    <div id="license"></div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="script.js"></script>
</body>
</html>
