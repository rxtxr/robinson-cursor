<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="robots" content="noindex,nofollow">
  <meta name="referrer" content="no-referrer">
  <title>Out of Africa — robinson-cursor / day 030</title>

  <!-- Preload the two latin-subset body fonts so first paint already has them.
       Italic, latin-ext, and Mono-500 come in via @font-face when needed. -->
  <link rel="preload" as="font" type="font/woff2" href="fonts/ebgaramond-roman-latin.woff2" crossorigin>
  <link rel="preload" as="font" type="font/woff2" href="fonts/plexmono-400-roman-latin.woff2" crossorigin>

  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="stage" aria-label="Out of Africa visualisation">
    <canvas id="map" aria-label="World map showing migration milestones"></canvas>

    <header class="timeline" role="region" aria-label="Timeline controls">
      <div class="timeline__clock">
        <span class="timeline__clock-label">Years ago</span>
        <span class="timeline__clock-value" id="clockValue">—</span>
        <span class="timeline__clock-alt" id="clockAlt"></span>
      </div>
      <button class="timeline__playpause" id="playPause" type="button" aria-label="Play / pause" disabled>
        <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><polygon points="6,4 20,12 6,20"></polygon></svg>
      </button>
      <div class="timeline__scrubber" role="slider" aria-label="Scrub through time" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" tabindex="0">
        <div class="timeline__track"></div>
        <div class="timeline__ticks" id="scrubberTicks" aria-hidden="true"></div>
        <div class="timeline__thumb" id="scrubberThumb" style="left:0%"></div>
      </div>
      <div class="timeline__hint" id="timelineHint">walking skeleton</div>
    </header>

    <div class="hud" aria-hidden="true">
      <span class="hud__label">PROJECTION</span>
      <span class="hud__value" id="hudProjection">globe</span>
      <span class="hud__sep">·</span>
      <span class="hud__label">ZOOM</span>
      <span class="hud__value" id="hudZoom">1.00</span>
      <span class="hud__sep">·</span>
      <span class="hud__label">α</span>
      <span class="hud__value" id="hudAlpha">0.00</span>
      <span class="hud__sep">·</span>
      <span class="hud__label">BACK</span>
      <span class="hud__value" id="hudBack">0/0</span>
    </div>

    <div class="layers" role="group" aria-label="Map layers">
      <label class="layers__toggle">
        <input type="checkbox" id="toggleAncestors" checked>
        <span>show ancestors</span>
      </label>
    </div>

    <nav class="bottombar" aria-label="Project navigation">
      <a href="/" target="_top" class="bottombar__link" rel="noopener">← all projects</a>
      <span class="bottombar__sep" aria-hidden="true">·</span>
      <button type="button" class="bottombar__link" id="aboutBtn">about</button>
      <span class="bottombar__sep" aria-hidden="true">·</span>
      <button type="button" class="bottombar__link" id="changelogBtn">changelog</button>
      <span class="bottombar__sep" aria-hidden="true">·</span>
      <button type="button" class="bottombar__link" id="feedbackBtn">feedback</button>
    </nav>

    <!-- Generic lightbox shell. JS sets the title + body and toggles `hidden`. -->
    <div class="lightbox" id="lightbox" hidden role="dialog" aria-modal="true" aria-labelledby="lightboxTitle">
      <div class="lightbox__overlay" data-lightbox-close></div>
      <div class="lightbox__panel">
        <button class="lightbox__close" id="lightboxClose" type="button" aria-label="Close">×</button>
        <h2 class="lightbox__title" id="lightboxTitle"></h2>
        <div class="lightbox__body" id="lightboxBody"></div>
      </div>
    </div>

    <aside class="panel" id="panel" aria-hidden="true" aria-labelledby="panelTitle">
      <button class="panel__close" id="panelClose" type="button" aria-label="Close panel">×</button>
      <header class="panel__header">
        <p class="panel__category" id="panelCategory"></p>
        <h2 class="panel__title" id="panelTitle"></h2>
        <p class="panel__date" id="panelDate"></p>
        <div class="panel__daterange" id="panelDateRange" aria-hidden="true">
          <div class="panel__daterange-track"></div>
          <div class="panel__daterange-bar" id="panelDateRangeBar"></div>
        </div>
        <p class="panel__location" id="panelLocation"></p>
        <p class="panel__confidence" id="panelConfidence" hidden></p>
        <p class="panel__confidence-note" id="panelConfidenceNote" hidden></p>
        <p class="panel__origin" id="panelOrigin" hidden></p>
      </header>
      <figure class="panel__image" id="panelImage" hidden>
        <a id="panelImageLink" target="_blank" rel="noopener noreferrer" aria-label="Open source image on Wikimedia Commons">
          <img id="panelImageEl" alt="" loading="lazy">
        </a>
        <figcaption class="panel__image-caption" id="panelImageCaption"></figcaption>
      </figure>
      <section class="panel__lay" id="panelLay" hidden></section>
      <section class="panel__summary" id="panelSummary">
        <h3 class="panel__section-title" id="panelSummaryTitle" hidden>Details</h3>
        <div id="panelSummaryBody"></div>
      </section>
      <section class="panel__appearance" id="panelAppearance" hidden aria-label="Appearance">
        <h3 class="panel__section-title">Appearance</h3>
        <div class="panel__appearance-body" id="panelAppearanceBody"></div>
      </section>
      <section class="panel__video" id="panelVideo" hidden aria-label="Video">
        <h3 class="panel__section-title">Watch</h3>
        <div class="panel__video-frame" id="panelVideoFrame"></div>
        <p class="panel__video-caption" id="panelVideoCaption"></p>
      </section>
      <section class="panel__refs" aria-label="References">
        <h3 class="panel__section-title">References</h3>
        <ol class="panel__refs-list" id="panelRefs"></ol>
      </section>
      <button type="button" class="panel__feedback" id="panelFeedbackBtn">
        Spotted a problem? Send feedback →
      </button>
    </aside>
  </main>

  <script type="module" src="main.js"></script>
</body>
</html>
