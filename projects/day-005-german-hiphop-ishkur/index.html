const gMap = new Map(genres.map(g => [g.id, g]));

// ─── LAYOUT ─────────────────────────────────────────────────────────
const ORIGIN_YEAR = 1979;
const END_YEAR = 2027;
const PX_PER_YEAR = 50;
const ROW_H = 40;
const BAR_W = 22; // stroke width of each path
const YEAR_Y = 30;  // y position of year labels
const TOP_PAD = 80; // y start of the tree (bars/diagonals)

function xOf(year) { return (year - ORIGIN_YEAR) * PX_PER_YEAR; }
function yOf(row) { return TOP_PAD + row * ROW_H; }

// Primary parent tree
const childrenOf = new Map();
genres.forEach(g => childrenOf.set(g.id, []));
genres.forEach(g => {
  if (g.parent_ids.length > 0 && childrenOf.has(g.parent_ids[0])) {
    childrenOf.get(g.parent_ids[0]).push(g.id);
  }
});
childrenOf.forEach((kids) => kids.sort((a, b) => gMap.get(a).year_start - gMap.get(b).year_start));

// Layout: parent in center of its DIRECT children (all adjacent, no gaps)
// Each subtree is compact: parent row, then children directly above/below
const rowMap = new Map();
let nextRow = 0;

// Count total rows needed for a subtree (node + all descendants)
function subtreeSize(id) {
  let size = 1;
  for (const kid of (childrenOf.get(id) || [])) size += subtreeSize(kid);
  return size;
}

function layoutSubtree(id) {
  const kids = childrenOf.get(id) || [];
  if (kids.length === 0) {
    rowMap.set(id, nextRow);
    nextRow++;
    return;
  }

  // Split children into upper half and lower half
  const midIdx = Math.floor(kids.length / 2);
  const upperKids = kids.slice(0, midIdx);
  const lowerKids = kids.slice(midIdx);

  // Layout upper children (each child + its subtree placed directly)
  for (const kid of upperKids) layoutSubtree(kid);

  // Parent goes here — right in the middle
  rowMap.set(id, nextRow);
  nextRow++;

  // Layout lower children
  for (const kid of lowerKids) layoutSubtree(kid);
}

// Old School is the main tree
const roots = genres.filter(g => g.parent_ids.length === 0);
const oldschool = roots.find(r => r.id === 'oldschool');
const otherRoots = roots.filter(r => r.id !== 'oldschool').sort((a,b) => a.year_start - b.year_start);
if (oldschool) layoutSubtree(oldschool.id);
nextRow++; // gap
for (const r of otherRoots) layoutSubtree(r.id);
genres.forEach(g => { if (!rowMap.has(g.id)) { rowMap.set(g.id, nextRow); nextRow++; } });

const rowOrder = [...rowMap.entries()].sort((a,b) => a[1] - b[1]).map(e => e[0]);

// ─── CANVAS ─────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let dpr = window.devicePixelRatio || 1;
let viewX = 0, viewY = 0, zoom = 1;
let dragX = 0, dragY = 0, dragging = false;

function resize() {
  dpr = window.devicePixelRatio || 1;
  canvas.width = window.innerWidth * dpr;
  canvas.height = window.innerHeight * dpr;
  canvas.style.width = window.innerWidth + 'px';
  canvas.style.height = window.innerHeight + 'px';
  draw();
}
window.addEventListener('resize', resize);
let dragMoved = false;
canvas.addEventListener('mousedown', e => { dragging = true; dragMoved = false; dragX = e.clientX; dragY = e.clientY; });
window.addEventListener('mousemove', e => {
  if (dragging) { dragMoved = true; viewX += e.clientX - dragX; viewY += e.clientY - dragY; dragX = e.clientX; dragY = e.clientY; draw(); }
});
window.addEventListener('mouseup', () => { dragging = false; });
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const old = zoom;
  zoom = Math.max(0.3, Math.min(4, zoom * (e.deltaY < 0 ? 1.08 : 1/1.08)));
  viewX = e.clientX - (e.clientX - viewX) * (zoom / old);
  viewY = e.clientY - (e.clientY - viewY) * (zoom / old);
  draw();
}, { passive: false });

// ─── TOUCH ──────────────────────────────────────────────────────────
let lastTouchDist = 0, lastTouchMid = null;
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (e.touches.length === 1) {
    dragging = true; dragMoved = false;
    dragX = e.touches[0].clientX; dragY = e.touches[0].clientY;
  } else if (e.touches.length === 2) {
    dragging = false;
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    lastTouchDist = Math.hypot(dx, dy);
    lastTouchMid = { x: (e.touches[0].clientX + e.touches[1].clientX) / 2, y: (e.touches[0].clientY + e.touches[1].clientY) / 2 };
  }
}, { passive: false });
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length === 1 && dragging) {
    dragMoved = true;
    const t = e.touches[0];
    viewX += t.clientX - dragX; viewY += t.clientY - dragY;
    dragX = t.clientX; dragY = t.clientY;
    draw();
  } else if (e.touches.length === 2) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const dist = Math.hypot(dx, dy);
    const mid = { x: (e.touches[0].clientX + e.touches[1].clientX) / 2, y: (e.touches[0].clientY + e.touches[1].clientY) / 2 };
    if (lastTouchDist > 0) {
      const old = zoom;
      zoom = Math.max(0.3, Math.min(4, zoom * (dist / lastTouchDist)));
      viewX = mid.x - (mid.x - viewX) * (zoom / old);
      viewY = mid.y - (mid.y - viewY) * (zoom / old);
    }
    if (lastTouchMid) {
      viewX += mid.x - lastTouchMid.x; viewY += mid.y - lastTouchMid.y;
    }
    lastTouchDist = dist; lastTouchMid = mid;
    draw();
  }
}, { passive: false });
canvas.addEventListener('touchend', e => {
  if (e.touches.length === 0) {
    if (!dragMoved && dragging) {
      const hit = hitTest(dragX, dragY);
      if (hit) openPanel(hit.id); else closePanel();
    }
    dragging = false; lastTouchDist = 0; lastTouchMid = null;
  } else if (e.touches.length === 1) {
    dragging = true; dragMoved = false;
    dragX = e.touches[0].clientX; dragY = e.touches[0].clientY;
    lastTouchDist = 0; lastTouchMid = null;
  }
});

// ─── DRAWING ────────────────────────────────────────────────────────
function hexToRgb(hex) {
  return [parseInt(hex.slice(1,3),16), parseInt(hex.slice(3,5),16), parseInt(hex.slice(5,7),16)];
}

function drawGrid() {
  ctx.strokeStyle = 'rgba(30,50,55,0.25)';
  ctx.lineWidth = 0.5;
  for (let y = ORIGIN_YEAR; y <= END_YEAR; y++) {
    const x = xOf(y);
    ctx.beginPath(); ctx.moveTo(x, TOP_PAD); ctx.lineTo(x, TOP_PAD + genres.length * ROW_H + 20); ctx.stroke();
  }
  ctx.strokeStyle = 'rgba(40,65,70,0.4)';
  ctx.lineWidth = 1;
  for (let y = 1980; y <= END_YEAR; y += 10) {
    const x = xOf(y);
    ctx.beginPath(); ctx.moveTo(x, TOP_PAD - 25); ctx.lineTo(x, TOP_PAD + genres.length * ROW_H + 20); ctx.stroke();
  }
  ctx.fillStyle = '#8899aa';
  ctx.font = 'bold 12px monospace';
  ctx.textAlign = 'center';
  for (let y = 1980; y <= END_YEAR; y += 5) ctx.fillText(y, xOf(y), YEAR_Y);
}

// Phase 1: Draw diagonal branch from parent
function drawDiag(g) {
  if (g.parent_ids.length === 0) return;
  const parent = gMap.get(g.parent_ids[0]);
  if (!parent) return;

  const row = rowMap.get(g.id);
  const myY = yOf(row);
  const barStart = xOf(g.year_start);
  const parentRow = rowMap.get(parent.id);
  const parentY = yOf(parentRow);
  const parentEnd = xOf(parent.year_end ?? END_YEAR);

  const rowDist = Math.abs(row - parentRow);
  const diagWidth = rowDist * ROW_H * 1.2;
  let branchX = barStart - diagWidth;
  // Gangsta: branch at same x as pop-rap so diagonal passes left of afro's bar
  if (g.id === 'gangsta') branchX = xOf(gMap.get('pop_rap').year_start) - Math.abs(rowMap.get('pop_rap') - rowMap.get('oldschool')) * ROW_H * 1.2;
  // Allow branching into oldschool's fade-in zone
  const parentVisualStart = parent.id === 'oldschool' ? xOf(parent.year_start) - 2 * PX_PER_YEAR : xOf(parent.year_start);
  const clampedBranch = Math.max(parentVisualStart, Math.min(parentEnd, branchX));

  const grad = ctx.createLinearGradient(clampedBranch, parentY, barStart, myY);
  grad.addColorStop(0, parent.color);
  grad.addColorStop(1, g.color);
  ctx.strokeStyle = grad;
  ctx.lineWidth = BAR_W;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.beginPath();
  ctx.moveTo(clampedBranch, parentY);
  ctx.lineTo(barStart, myY);
  ctx.stroke();
}

// Phase 2: Draw horizontal bar + dot + text
function drawBar(g) {
  const row = rowMap.get(g.id);
  const myY = yOf(row);
  const barEnd = xOf(g.year_end ?? END_YEAR);
  const barStart = xOf(g.year_start);
  const [r, gb, b] = hexToRgb(g.color);

  // Oldschool: fade-in from transparent before türkisch branch point
  if (g.id === 'oldschool') {
    const fadeStart = barStart - 2 * PX_PER_YEAR;
    const grad = ctx.createLinearGradient(fadeStart, myY, barStart, myY);
    grad.addColorStop(0, `rgba(${r},${gb},${b},0)`);
    grad.addColorStop(1, g.color);
    ctx.strokeStyle = grad;
    ctx.lineWidth = BAR_W;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(fadeStart, myY);
    ctx.lineTo(barStart, myY);
    ctx.stroke();
  }

  ctx.strokeStyle = g.color;
  ctx.lineWidth = BAR_W;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.beginPath();
  ctx.moveTo(barStart, myY);
  ctx.lineTo(barEnd, myY);
  ctx.stroke();

  // Dot
  ctx.fillStyle = '#ffffff';
  ctx.beginPath(); ctx.arc(barStart, myY, 5, 0, Math.PI * 2); ctx.fill();

  // Name
  ctx.fillStyle = '#d8dce4';
  ctx.font = 'bold 13px "Segoe UI", system-ui, sans-serif';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'middle';
  ctx.shadowColor = 'rgba(0,0,0,0.8)';
  ctx.shadowBlur = 4;
  ctx.fillText(g.name, barStart + 10, myY);
  ctx.shadowColor = 'transparent';
  ctx.shadowBlur = 0;

  // Repeated name
  ctx.fillStyle = `rgba(${Math.min(255,r+60)},${Math.min(255,gb+60)},${Math.min(255,b+60)},0.35)`;
  ctx.font = '10px "Segoe UI", system-ui, sans-serif';
  const nw = ctx.measureText(g.name).width;
  const sp = Math.max(nw + 40, 190);
  for (let lx = barStart + sp; lx < barEnd - 10; lx += sp) {
    ctx.fillText(g.name, lx, myY);
  }
}

function draw() {
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.fillStyle = '#0a1419';
  ctx.fillRect(0, 0, canvas.width / dpr, canvas.height / dpr);
  ctx.save();
  ctx.translate(viewX, viewY);
  ctx.scale(zoom, zoom);
  drawGrid();
  // Phase 1: ALL diagonals first (bottom-to-top so upward diags are on top)
  const bottomUp = [...rowOrder].sort((a, b) => rowMap.get(b) - rowMap.get(a));
  for (const id of bottomUp) drawDiag(gMap.get(id));
  // Phase 2: ALL horizontal bars on top (bottom-to-top)
  for (const id of bottomUp) drawBar(gMap.get(id));
  ctx.restore();
}

function hitTest(clientX, clientY) {
  const cx = (clientX - viewX) / zoom;
  const cy = (clientY - viewY) / zoom;
  for (const g of genres) {
    const row = rowMap.get(g.id);
    const myY = yOf(row);
    const barStart = xOf(g.year_start);
    const barEnd = xOf(g.year_end ?? END_YEAR);
    if (cx >= barStart - 5 && cx <= barEnd + 5 && Math.abs(cy - myY) <= BAR_W / 2 + 2) return g;
  }
  return null;
}

let currentPanel = null;
const panel = document.getElementById('detail-panel');

function openPanel(id) {
  const g = gMap.get(id);
  if (!g) return;
  currentPanel = id;
  panel.classList.add('open');

  const header = document.getElementById('detail-header');
  header.style.background = g.color + '40';
  header.style.borderLeftColor = g.color;
  document.getElementById('dp-name').textContent = g.name;
  document.getElementById('dp-era').textContent = g.year_start + '\u2013' + (g.year_end ?? 'heute');

  const body = document.getElementById('detail-body');
  const genreArtists = (g.artist_ids || []).map(aById).filter(Boolean);
  const genreTracks = (g.track_ids || []).map(tById).filter(Boolean);
  const genreLabels = (g.label_ids || []).map(lById).filter(Boolean);
  const parents = (g.parent_ids || []).map(pid => gMap.get(pid)).filter(Boolean);
  const children = genres.filter(c => c.parent_ids.includes(id));

  let html = '';

  // Beschreibung
  html += '<div class="d-section"><div class="d-label">Beschreibung</div><div class="d-text">' + g.description + '</div></div>';

  // Merkmale
  if (g.characteristics && g.characteristics.length) {
    html += '<div class="d-section"><div class="d-label">Merkmale</div><div class="d-pills">' + g.characteristics.map(c => '<span class="d-pill">' + c + '</span>').join('') + '</div></div>';
  }

  // Regionen
  if (g.regions && g.regions.length) {
    html += '<div class="d-section"><div class="d-label">Regionen</div><div class="d-pills">' + g.regions.map(r => '<span class="d-pill">' + r + '</span>').join('') + '</div></div>';
  }

  // Internationale Einflüsse
  if (g.influenced_by && g.influenced_by.length) {
    html += '<div class="d-section"><div class="d-label">Internationale Einfl\u00fcsse</div><div class="d-pills">' + g.influenced_by.map(i => '<span class="d-pill">' + i + '</span>').join('') + '</div></div>';
  }

  // Eltern-Genres
  if (parents.length) {
    html += '<div class="d-section"><div class="d-label">Eltern-Genres</div><div class="d-pills">' + parents.map(p => '<span class="d-link" onclick="openPanel(\'' + p.id + '\')"><span class="dot" style="background:' + p.color + '"></span>' + p.name + '</span>').join('') + '</div></div>';
  }

  // Kinder-Genres
  if (children.length) {
    html += '<div class="d-section"><div class="d-label">Abgeleitete Genres</div><div class="d-pills">' + children.map(c => '<span class="d-link" onclick="openPanel(\'' + c.id + '\')"><span class="dot" style="background:' + c.color + '"></span>' + c.name + '</span>').join('') + '</div></div>';
  }

  // Artists
  if (genreArtists.length) {
    html += '<div class="d-section"><div class="d-label">Artists (' + genreArtists.length + ')</div>';
    html += genreArtists.map(a => '<div class="d-artist">' + a.name + '<span>' + a.origin + ' \u00b7 ' + a.key_release + '</span></div>').join('');
    html += '</div>';
  }

  // Key Tracks
  if (genreTracks.length) {
    html += '<div class="d-section"><div class="d-label">Key Tracks</div>';
    html += genreTracks.map(t => '<div class="d-track"><div class="d-track-title">' + t.title + ' <span class="d-track-meta">' + t.artist + ' \u00b7 ' + t.year + '</span></div><div class="d-track-sig">' + t.significance + '</div></div>').join('');
    html += '</div>';
  }

  // Labels
  if (genreLabels.length) {
    html += '<div class="d-section"><div class="d-label">Labels</div>';
    html += genreLabels.map(l => '<div class="d-label-item">' + l.name + '<span>' + l.city + ' \u00b7 gegr. ' + l.founded + '</span></div>').join('');
    html += '</div>';
  }

  body.innerHTML = html;
  body.scrollTop = 0;
}

function closePanel() {
  currentPanel = null;
  panel.classList.remove('open');
}

document.getElementById('detail-close').addEventListener('click', closePanel);

canvas.addEventListener('click', e => {
  if (dragMoved) return;
  const hit = hitTest(e.clientX, e.clientY);
  if (hit) {
    openPanel(hit.id);
  } else {
    closePanel();
  }
});

// Cursor: pointer on hover over bars
canvas.addEventListener('mousemove', e => {
  if (dragging) return;
  canvas.style.cursor = hitTest(e.clientX, e.clientY) ? 'pointer' : 'grab';
});

// Hide onboarding after first interaction
const onboarding = document.getElementById('onboarding');
function hideOnboarding() {
  onboarding.classList.add('hidden');
  setTimeout(() => onboarding.style.display = 'none', 1000);
  canvas.removeEventListener('mousedown', hideOnboarding);
  canvas.removeEventListener('wheel', hideOnboarding);
  canvas.removeEventListener('touchstart', hideOnboarding);
}
canvas.addEventListener('mousedown', hideOnboarding);
canvas.addEventListener('wheel', hideOnboarding);
canvas.addEventListener('touchstart', hideOnboarding);

resize();
viewX = 20; viewY = 10;
draw();
</script>
</body>
</html>
