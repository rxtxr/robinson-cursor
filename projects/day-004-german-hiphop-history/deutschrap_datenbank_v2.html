function gById(id){return DB.genres.find(x=>x.id===id)}
function aById(id){return DB.artists.find(x=>x.id===id)}
function tById(id){return DB.tracks.find(x=>x.id===id)}
function lById(id){return DB.labels.find(x=>x.id===id)}

function renderSidebar(){
 const sb=document.getElementById('sidebar');
 sb.innerHTML=ERAS.map(era=>`
  <div class="era-label">${era.label}</div>
  ${era.ids.map(id=>{const g=gById(id);return g?`
   <div class="gitem" id="gi-${g.id}" onclick="selectGenre('${g.id}')">
    <span class="dot" style="background:${g.color}"></span>
    ${g.name}${g.isNew?'<span class="badge-new">neu</span>':''}
   </div>`:''}).join('')}
 `).join('');
}

function selectGenre(id){
 document.querySelectorAll('.gitem').forEach(el=>{el.classList.remove('active');el.style.borderLeftColor='transparent'});
 const item=document.getElementById('gi-'+id);
 if(item){item.classList.add('active');item.style.borderLeftColor=gById(id)?.color||'#ccc'}
 const g=gById(id);if(!g)return;
 const artists=g.artist_ids.map(aById).filter(Boolean);
 const tracks=g.track_ids.map(tById).filter(Boolean);
 const labels=g.label_ids.map(lById).filter(Boolean);
 const parents=g.parent_ids.map(gById).filter(Boolean);
 const children=DB.connections.filter(c=>c.from===id).map(c=>({g:gById(c.to),c})).filter(x=>x.g);
 const incoming=DB.connections.filter(c=>c.to===id).map(c=>({g:gById(c.from),c})).filter(x=>x.g);
 const d=document.getElementById('detail');
 d.style='';
 d.innerHTML=`
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:5px">
   <span class="dot" style="background:${g.color};width:12px;height:12px"></span>
   <div class="dname">${g.name}</div>${g.isNew?'<span class="badge-new">neu in v2</span>':''}
  </div>
  <div class="dera">${g.era}${g.year_end===null?' · aktiv':''}</div>
  <div class="ddesc">${g.description}</div>
  <div class="slabel">Merkmale</div>
  <div class="tags">${g.characteristics.map(c=>`<span class="tag">${c}</span>`).join('')}</div>
  <div class="slabel">Regionen</div>
  <div class="tags">${g.regions.map(r=>`<span class="tag">${r}</span>`).join('')}</div>
  ${g.influenced_by?.length?`<div class="slabel">Internationale Einflüsse</div><div class="tags">${g.influenced_by.map(i=>`<span class="tag">${i}</span>`).join('')}</div>`:''}
  ${parents.length?`<div class="slabel">Eltern-Genres</div><div class="tags">${parents.map(p=>`<span class="glink" onclick="selectGenre('${p.id}')"><span class="dot" style="background:${p.color}"></span>${p.name}</span>`).join('')}</div>`:''}
  ${children.length?`<div class="slabel">Beeinflusste Genres</div><div class="tags">${children.map(({g:p,c})=>`<span class="glink" onclick="selectGenre('${p.id}')" title="${c.label}"><span class="dot" style="background:${p.color}"></span>${p.name} →</span>`).join('')}</div>`:''}
  ${incoming.length?`<div class="slabel">Einflüsse von</div><div class="tags">${incoming.map(({g:p,c})=>`<span class="glink" onclick="selectGenre('${p.id}')" title="${c.label}"><span class="dot" style="background:${p.color}"></span>← ${p.name}</span>`).join('')}</div>`:''}
  ${artists.length?`<div class="slabel">Repräsentative Artists (${artists.length})</div><div class="alist">${artists.map(a=>`<div class="aitem">${a.name}<span>${a.origin} · seit ${a.since}</span></div>`).join('')}</div>`:''}
  ${tracks.length?`<div class="slabel">Key Tracks (${tracks.length})</div><div class="alist">${tracks.map(t=>`<div class="aitem" style="flex-direction:column;align-items:flex-start;gap:2px"><span style="font-size:12px;color:var(--color-text-primary)">${t.title} <span style="color:var(--color-text-tertiary)">${t.artist} · ${t.year}</span></span><span style="font-size:11px;line-height:1.5;color:var(--color-text-secondary)">${t.significance}</span></div>`).join('')}</div>`:''}
  ${labels.length?`<div class="slabel">Labels</div><div class="alist">${labels.map(l=>`<div class="aitem">${l.name}<span>${l.city} · gegr. ${l.founded}</span></div>`).join('')}</div>`:''}
 `;
}

function renderSchema(){
 const SCHEMA=[
  {entity:'Genre',fields:[{name:'id',type:'string PK'},{name:'name',type:'string'},{name:'era',type:'string'},{name:'year_start / year_end',type:'number | null'},{name:'description',type:'string'},{name:'characteristics',type:'string[]'},{name:'regions',type:'string[]'},{name:'parent_ids',type:'Genre.id[]'},{name:'influenced_by',type:'string[]'},{name:'color',type:'hex string'},{name:'isNew',type:'boolean (optional)'},{name:'label_ids',type:'Label.id[]'},{name:'artist_ids',type:'Artist.id[]'},{name:'track_ids',type:'Track.id[]'}]},
  {entity:'Artist',fields:[{name:'id',type:'string PK'},{name:'name',type:'string'},{name:'origin',type:'string (Stadt)'},{name:'since',type:'number (Jahr)'},{name:'primary_genre',type:'Genre.id'},{name:'genres',type:'Genre.id[]'},{name:'key_release',type:'string'}]},
  {entity:'Track',fields:[{name:'id',type:'string PK'},{name:'title',type:'string'},{name:'artist',type:'string'},{name:'year',type:'number'},{name:'genre_id',type:'Genre.id'},{name:'significance',type:'string'}]},
  {entity:'Label',fields:[{name:'id',type:'string PK'},{name:'name',type:'string'},{name:'city',type:'string'},{name:'founded',type:'number'},{name:'genre_ids',type:'Genre.id[]'}]},
  {entity:'Connection',fields:[{name:'from',type:'Genre.id'},{name:'to',type:'Genre.id'},{name:'type',type:'"evolved_into"|"influenced"|"spawned"|"parallel_development"'},{name:'label',type:'string'}]}
 ];
 document.getElementById('tab-schema').innerHTML=`
  <p style="font-size:13px;color:var(--color-text-secondary);margin-bottom:16px;line-height:1.65">
   5 Entitäten. <strong style="color:var(--color-text-primary)">Genre</strong> ist zentral; <strong style="color:var(--color-text-primary)">Connection</strong> bildet den Genealogie-Graphen.
  </p>
  <div class="sgrid">${SCHEMA.map(s=>`<div class="scard"><div class="stitle">${s.entity}</div>${s.fields.map(f=>`<div class="frow"><span>${f.name}</span><span class="ftype">${f.type}</span></div>`).join('')}</div>`).join('')}</div>
  <div class="stat-row">
   <div class="stat"><div class="stat-n">${DB.genres.length}</div><div class="stat-l">Genres</div></div>
   <div class="stat"><div class="stat-n">${DB.artists.length}</div><div class="stat-l">Artists</div></div>
   <div class="stat"><div class="stat-n">${DB.tracks.length}</div><div class="stat-l">Key Tracks</div></div>
   <div class="stat"><div class="stat-n">${DB.labels.length}</div><div class="stat-l">Labels</div></div>
   <div class="stat"><div class="stat-n">${DB.connections.length}</div><div class="stat-l">Verbindungen</div></div>
   <div class="stat"><div class="stat-n">${DB.genres.filter(g=>g.isNew).length}</div><div class="stat-l">Neu in v2</div></div>
  </div>`;
}

function showTab(tab){
 ['genres','schema','export'].forEach(t=>document.getElementById('tab-'+t).style.display=t===tab?'':'none');
 document.querySelectorAll('.tab-btn').forEach((btn,i)=>btn.classList.toggle('active',['genres','schema','export'][i]===tab));
 if(tab==='export')document.getElementById('json-out').value=JSON.stringify(DB,null,2);
 if(tab==='schema'&&!document.getElementById('tab-schema').innerHTML.trim())renderSchema();
}

function copyJSON(){
 const ta=document.getElementById('json-out');ta.select();
 try{document.execCommand('copy')}catch(e){}
 const btn=document.getElementById('copy-btn');
 btn.textContent='✓ Kopiert';setTimeout(()=>btn.textContent='Kopieren',2000);
}

renderSidebar();
</script>
