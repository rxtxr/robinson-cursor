<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Moiré Explorer — Day 001</title>
<style>
:root {
  --bg: #0a0a0f;
  --bg-panel: #12121a;
  --bg-control: #1a1a28;
  --border: #2a2a3a;
  --text: #c8c8d4;
  --text-dim: #6a6a7a;
  --accent: #00d4aa;
  --accent-dim: #00a080;
  --mono: 'JetBrains Mono', 'Fira Code', 'SF Mono', monospace;
  --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body { height: 100%; overflow: hidden; }

body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  display: flex;
  flex-direction: column;
}

/* Tab bar */
.tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
  background: var(--bg-panel);
  flex-shrink: 0;
}

.tab {
  padding: 12px 20px;
  font-family: var(--mono);
  font-size: 13px;
  color: var(--text-dim);
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  cursor: pointer;
  transition: color 0.2s, border-color 0.2s;
  white-space: nowrap;
}

.tab:hover { color: var(--text); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }

.tab kbd {
  font-size: 10px;
  padding: 1px 5px;
  border: 1px solid var(--border);
  border-radius: 3px;
  margin-left: 6px;
  color: var(--text-dim);
}

/* Main layout */
.main {
  display: flex;
  flex: 1;
  min-height: 0;
}

/* Controls panel */
.controls {
  width: 280px;
  flex-shrink: 0;
  background: var(--bg-panel);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  padding: 16px;
}

.control-group {
  margin-bottom: 16px;
}

.control-group label {
  display: flex;
  justify-content: space-between;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-dim);
  margin-bottom: 4px;
  text-transform: lowercase;
}

.control-group label .val {
  color: var(--accent);
  font-weight: 600;
}

input[type="range"] {
  -webkit-appearance: none;
  width: 100%;
  height: 4px;
  background: var(--bg-control);
  border-radius: 2px;
  outline: none;
}

input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: var(--accent);
  cursor: pointer;
}

input[type="range"]::-moz-range-thumb {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: var(--accent);
  border: none;
  cursor: pointer;
}

input[type="color"] {
  -webkit-appearance: none;
  border: 1px solid var(--border);
  border-radius: 4px;
  width: 32px;
  height: 24px;
  padding: 0;
  cursor: pointer;
  background: none;
}

input[type="color"]::-webkit-color-swatch-wrapper { padding: 2px; }
input[type="color"]::-webkit-color-swatch { border: none; border-radius: 2px; }

select {
  width: 100%;
  padding: 6px 8px;
  font-family: var(--mono);
  font-size: 11px;
  background: var(--bg-control);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 4px;
  cursor: pointer;
}

.checkbox-row {
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-dim);
}

.btn {
  padding: 6px 12px;
  font-family: var(--mono);
  font-size: 11px;
  background: var(--bg-control);
  color: var(--accent);
  border: 1px solid var(--border);
  border-radius: 4px;
  cursor: pointer;
  transition: background 0.2s;
}

.btn:hover { background: var(--border); }

.btn-row { display: flex; gap: 8px; margin-bottom: 16px; }

/* Viewport */
.viewport {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
}

.canvas-wrap {
  flex: 1;
  position: relative;
  min-height: 0;
}

.canvas-wrap canvas {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
}

/* Formula bar */
.formula-bar {
  padding: 10px 16px;
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text);
  background: var(--bg-panel);
  border-top: 1px solid var(--border);
  display: flex;
  gap: 24px;
  flex-wrap: wrap;
  flex-shrink: 0;
}

.formula-bar .label { color: var(--text-dim); }
.formula-bar .value { color: var(--accent); font-weight: 600; }

/* Info panel */
.info-toggle {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-dim);
  background: none;
  border: none;
  padding: 4px 0;
  cursor: pointer;
  margin-bottom: 8px;
}

.info-toggle:hover { color: var(--accent); }

.info-text {
  font-size: 12px;
  line-height: 1.7;
  color: var(--text-dim);
  padding: 8px 0;
  border-top: 1px solid var(--border);
  display: none;
}

.info-text.open { display: block; }

/* Shortcuts bar */
.shortcuts {
  padding: 6px 16px;
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-dim);
  background: var(--bg-panel);
  border-top: 1px solid var(--border);
  display: flex;
  gap: 16px;
  flex-shrink: 0;
}

.shortcuts kbd {
  padding: 1px 5px;
  border: 1px solid var(--border);
  border-radius: 3px;
  margin-right: 4px;
}

/* Mobile */
@media (max-width: 700px) {
  .main { flex-direction: column; }
  .controls {
    width: 100%;
    max-height: 40vh;
    border-right: none;
    border-top: 1px solid var(--border);
    order: 2;
  }
  .viewport { order: 1; }
  .tab { padding: 10px 12px; font-size: 11px; }
  .tab kbd { display: none; }
  .shortcuts { display: none; }
}
</style>
</head>
<body>

<div class="tabs" id="tabs">
  <button class="tab active" data-tab="0">rotation <kbd>1</kbd></button>
  <button class="tab" data-tab="1">frequency <kbd>2</kbd></button>
  <button class="tab" data-tab="2">circles <kbd>3</kbd></button>
  <button class="tab" data-tab="3">sine (GL) <kbd>4</kbd></button>
</div>

<div class="main">
  <div class="controls" id="controls"></div>
  <div class="viewport">
    <div class="canvas-wrap" id="canvasWrap"></div>
    <div class="formula-bar" id="formulaBar"></div>
  </div>
</div>

<div class="shortcuts">
  <span><kbd>1</kbd>–<kbd>4</kbd> switch effect</span>
  <span><kbd>space</kbd> play/pause</span>
  <span><kbd>R</kbd> reset</span>
  <span><kbd>F</kbd> fullscreen</span>
</div>

<script>
// ─── State ──────────────────────────────────────────────────
const state = {
  tab: 0,
  animating: false,
  mouse: { x: 0.5, y: 0.5 },
  effects: [
    { theta: 5, period: 20, duty: 0.5, phase: 0, color1: '#000000', color2: '#000000', blend: 'normal' },
    { p1: 20, p2: 22, duty: 0.5, phase1: 0, phase2: 0, autoShift: false, speed: 1, deltaMode: false },
    { period: 15, rings: 40, lineWidth: 1, fixCenter: false },
    { f1: 30, f2: 32, theta1: 0, theta2: 5, amplitude: 1, colorMode: 0, autoRotate: false, rotSpeed: 0.5, zoom: 1 },
  ]
};

// ─── Canvas / WebGL setup ───────────────────────────────────
const wrap = document.getElementById('canvasWrap');
const canvas2d = document.createElement('canvas');
const canvasGL = document.createElement('canvas');
const ctx = canvas2d.getContext('2d');
let gl, glProgram, glUniforms;

function initWebGL(canvas) {
  gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
  if (!gl) return false;

  const vs = gl.createShader(gl.VERTEX_SHADER);
  gl.shaderSource(vs, `attribute vec2 a_pos; void main() { gl_Position = vec4(a_pos, 0, 1); }`);
  gl.compileShader(vs);

  const fs = gl.createShader(gl.FRAGMENT_SHADER);
  gl.shaderSource(fs, `
    precision highp float;
    uniform vec2 u_resolution;
    uniform float u_f1, u_f2, u_theta1, u_theta2;
    uniform float u_amplitude, u_time, u_zoom;
    uniform vec2 u_mouse;
    uniform int u_colormode;

    vec3 viridis(float t) {
      vec3 c0 = vec3(0.267,0.004,0.329);
      vec3 c1 = vec3(0.283,0.141,0.458);
      vec3 c2 = vec3(0.254,0.265,0.530);
      vec3 c3 = vec3(0.206,0.372,0.553);
      vec3 c4 = vec3(0.164,0.471,0.558);
      vec3 c5 = vec3(0.128,0.567,0.551);
      vec3 c6 = vec3(0.135,0.659,0.518);
      vec3 c7 = vec3(0.267,0.749,0.441);
      vec3 c8 = vec3(0.478,0.821,0.318);
      vec3 c9 = vec3(0.741,0.873,0.150);
      vec3 c10 = vec3(0.993,0.906,0.144);
      float s = t * 10.0;
      int i = int(s);
      float f = fract(s);
      if (i >= 10) return c10;
      if (i == 0) return mix(c0, c1, f);
      if (i == 1) return mix(c1, c2, f);
      if (i == 2) return mix(c2, c3, f);
      if (i == 3) return mix(c3, c4, f);
      if (i == 4) return mix(c4, c5, f);
      if (i == 5) return mix(c5, c6, f);
      if (i == 6) return mix(c6, c7, f);
      if (i == 7) return mix(c7, c8, f);
      if (i == 8) return mix(c8, c9, f);
      return mix(c9, c10, f);
    }

    vec3 inferno(float t) {
      vec3 c0 = vec3(0.001,0.000,0.014);
      vec3 c1 = vec3(0.106,0.032,0.245);
      vec3 c2 = vec3(0.280,0.047,0.398);
      vec3 c3 = vec3(0.453,0.082,0.398);
      vec3 c4 = vec3(0.610,0.148,0.338);
      vec3 c5 = vec3(0.748,0.241,0.253);
      vec3 c6 = vec3(0.854,0.367,0.159);
      vec3 c7 = vec3(0.929,0.520,0.055);
      vec3 c8 = vec3(0.961,0.695,0.039);
      vec3 c9 = vec3(0.950,0.872,0.227);
      vec3 c10 = vec3(0.988,0.998,0.645);
      float s = t * 10.0;
      int i = int(s);
      float f = fract(s);
      if (i >= 10) return c10;
      if (i == 0) return mix(c0, c1, f);
      if (i == 1) return mix(c1, c2, f);
      if (i == 2) return mix(c2, c3, f);
      if (i == 3) return mix(c3, c4, f);
      if (i == 4) return mix(c4, c5, f);
      if (i == 5) return mix(c5, c6, f);
      if (i == 6) return mix(c6, c7, f);
      if (i == 7) return mix(c7, c8, f);
      if (i == 8) return mix(c8, c9, f);
      return mix(c9, c10, f);
    }

    void main() {
      vec2 uv = (gl_FragCoord.xy - u_resolution * 0.5) / u_zoom;
      uv += (u_mouse - 0.5) * u_resolution * 0.3;
      float rad1 = u_theta1 * 3.14159265 / 180.0;
      float rad2 = u_theta2 * 3.14159265 / 180.0;
      float v1 = sin(6.28318 * (uv.x * cos(rad1) + uv.y * sin(rad1)) / u_f1);
      float v2 = sin(6.28318 * (uv.x * cos(rad2) + uv.y * sin(rad2)) / u_f2);
      float val = (v1 + v2) * 0.5 * u_amplitude;
      float t = val * 0.5 + 0.5;
      vec3 col;
      if (u_colormode == 0) { col = vec3(t); }
      else if (u_colormode == 1) { col = viridis(t); }
      else { col = inferno(t); }
      gl_FragColor = vec4(col, 1.0);
    }
  `);
  gl.compileShader(fs);

  glProgram = gl.createProgram();
  gl.attachShader(glProgram, vs);
  gl.attachShader(glProgram, fs);
  gl.linkProgram(glProgram);
  gl.useProgram(glProgram);

  const buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
  const aPos = gl.getAttribLocation(glProgram, 'a_pos');
  gl.enableVertexAttribArray(aPos);
  gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

  glUniforms = {};
  ['u_resolution','u_f1','u_f2','u_theta1','u_theta2','u_amplitude','u_time','u_zoom','u_mouse','u_colormode']
    .forEach(n => glUniforms[n] = gl.getUniformLocation(glProgram, n));

  return true;
}

// ─── Controls builders ──────────────────────────────────────
const controlsEl = document.getElementById('controls');
const formulaBar = document.getElementById('formulaBar');

function slider(label, value, min, max, step, onChange) {
  const div = document.createElement('div');
  div.className = 'control-group';
  const lbl = document.createElement('label');
  const valSpan = document.createElement('span');
  valSpan.className = 'val';
  valSpan.textContent = Number(value).toFixed(step < 1 ? 1 : 0);
  lbl.innerHTML = `<span>${label}</span>`;
  lbl.appendChild(valSpan);
  const input = document.createElement('input');
  input.type = 'range';
  input.min = min; input.max = max; input.step = step; input.value = value;
  input.addEventListener('input', () => {
    valSpan.textContent = Number(input.value).toFixed(step < 1 ? 1 : 0);
    onChange(Number(input.value));
  });
  div.appendChild(lbl);
  div.appendChild(input);
  return div;
}

function selectCtrl(label, options, value, onChange) {
  const div = document.createElement('div');
  div.className = 'control-group';
  const lbl = document.createElement('label');
  lbl.innerHTML = `<span>${label}</span>`;
  const sel = document.createElement('select');
  options.forEach((opt, i) => {
    const o = document.createElement('option');
    o.value = i; o.textContent = opt;
    if (i === value) o.selected = true;
    sel.appendChild(o);
  });
  sel.addEventListener('change', () => onChange(Number(sel.value)));
  div.appendChild(lbl);
  div.appendChild(sel);
  return div;
}

function checkbox(label, checked, onChange) {
  const div = document.createElement('div');
  div.className = 'checkbox-row';
  const input = document.createElement('input');
  input.type = 'checkbox'; input.checked = checked;
  input.addEventListener('change', () => onChange(input.checked));
  const span = document.createElement('span');
  span.textContent = label;
  div.appendChild(input);
  div.appendChild(span);
  return div;
}

function infoPanel(title, text) {
  const wrap = document.createElement('div');
  const btn = document.createElement('button');
  btn.className = 'info-toggle';
  btn.textContent = `▸ ${title}`;
  const content = document.createElement('div');
  content.className = 'info-text';
  content.textContent = text;
  btn.addEventListener('click', () => {
    content.classList.toggle('open');
    btn.textContent = content.classList.contains('open') ? `▾ ${title}` : `▸ ${title}`;
  });
  wrap.appendChild(btn);
  wrap.appendChild(content);
  return wrap;
}

// ─── Effect renderers ───────────────────────────────────────
function drawLineGrating(ctx, w, h, period, duty, phase, angle, color) {
  ctx.save();
  ctx.translate(w / 2, h / 2);
  ctx.rotate(angle);
  const lineW = period * duty;
  const diag = Math.sqrt(w * w + h * h);
  const n = Math.ceil(diag / period) + 1;
  ctx.fillStyle = color;
  for (let i = -n; i <= n; i++) {
    const x = i * period + phase * period - lineW / 2;
    ctx.fillRect(x, -diag / 2, lineW, diag);
  }
  ctx.restore();
}

const effects = [
  // Effect 0: Rotation Moiré
  {
    buildControls() {
      const e = state.effects[0];
      const f = document.createDocumentFragment();
      f.appendChild(slider('θ angle (°)', e.theta, 0.1, 45, 0.1, v => { e.theta = v; }));
      f.appendChild(slider('period (px)', e.period, 5, 80, 1, v => { e.period = v; }));
      f.appendChild(slider('duty cycle', e.duty, 0.1, 0.9, 0.01, v => { e.duty = v; }));
      f.appendChild(slider('phase offset', e.phase, 0, 1, 0.01, v => { e.phase = v; }));
      f.appendChild(infoPanel('about this effect',
        'Two identical line gratings overlaid with a relative rotation angle θ produce a moiré pattern. The resulting pattern period is p/(2·sin(θ/2)). At small angles, tiny rotations create dramatically large patterns — a form of angular amplification.'));
      controlsEl.appendChild(f);
    },
    render(w, h) {
      const e = state.effects[0];
      const theta = e.theta * Math.PI / 180;
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, w, h);
      ctx.globalCompositeOperation = e.blend === 'multiply' ? 'multiply' : e.blend === 'difference' ? 'difference' : 'source-over';
      drawLineGrating(ctx, w, h, e.period, e.duty, 0, 0, e.color1);
      drawLineGrating(ctx, w, h, e.period, e.duty, e.phase, theta, e.color2);
      ctx.globalCompositeOperation = 'source-over';
    },
    formula() {
      const e = state.effects[0];
      const theta = e.theta * Math.PI / 180;
      const sinHalf = Math.sin(theta / 2);
      const pm = sinHalf > 0.0001 ? e.period / (2 * sinHalf) : Infinity;
      return `<span class="label">p</span><span class="value">${e.period}px</span>` +
        `<span class="label">θ</span><span class="value">${e.theta.toFixed(1)}°</span>` +
        `<span class="label">p<sub>moiré</sub> = p / (2·sin(θ/2)) =</span><span class="value">${pm === Infinity ? '∞' : pm.toFixed(1) + 'px'}</span>`;
    }
  },

  // Effect 1: Frequency Beating
  {
    buildControls() {
      const e = state.effects[1];
      const f = document.createDocumentFragment();
      f.appendChild(slider('p₁ (px)', e.p1, 5, 100, 0.5, v => { e.p1 = v; }));
      f.appendChild(slider('p₂ (px)', e.p2, 5, 100, 0.5, v => { e.p2 = v; }));
      f.appendChild(slider('duty cycle', e.duty, 0.1, 0.9, 0.01, v => { e.duty = v; }));
      f.appendChild(slider('shift speed', e.speed, 0.1, 5, 0.1, v => { e.speed = v; }));
      f.appendChild(checkbox('auto-shift', e.autoShift, v => { e.autoShift = v; }));
      f.appendChild(infoPanel('about this effect',
        'Two parallel gratings with slightly different periods p₁ and p₂ create a beat pattern. The moiré period is (p₁·p₂)/|p₁−p₂|. As the periods approach each other, the moiré pattern grows infinitely large — the beating slows down, like two slightly detuned tuning forks.'));
      controlsEl.appendChild(f);
    },
    render(w, h) {
      const e = state.effects[1];
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, w, h);
      drawLineGrating(ctx, w, h, e.p1, e.duty, e.phase1, 0, '#000000');
      ctx.globalCompositeOperation = 'multiply';
      drawLineGrating(ctx, w, h, e.p2, e.duty, e.phase2, 0, '#000000');
      ctx.globalCompositeOperation = 'source-over';
    },
    formula() {
      const e = state.effects[1];
      const delta = Math.abs(e.p1 - e.p2);
      const pm = delta > 0.01 ? (e.p1 * e.p2) / delta : Infinity;
      return `<span class="label">p₁</span><span class="value">${e.p1.toFixed(1)}px</span>` +
        `<span class="label">p₂</span><span class="value">${e.p2.toFixed(1)}px</span>` +
        `<span class="label">Δ</span><span class="value">${delta.toFixed(1)}px</span>` +
        `<span class="label">p<sub>moiré</sub> = (p₁·p₂)/|p₁−p₂| =</span><span class="value">${pm === Infinity ? '∞' : pm.toFixed(1) + 'px'}</span>`;
    },
    animate(dt) {
      const e = state.effects[1];
      if (e.autoShift) {
        e.phase2 = (e.phase2 + dt * e.speed * 0.001) % 1;
      }
    }
  },

  // Effect 2: Concentric Circles
  {
    buildControls() {
      const e = state.effects[2];
      const f = document.createDocumentFragment();
      f.appendChild(slider('ring spacing (px)', e.period, 5, 60, 1, v => { e.period = v; }));
      f.appendChild(slider('ring count', e.rings, 5, 80, 1, v => { e.rings = v; }));
      f.appendChild(slider('line width', e.lineWidth, 0.5, 4, 0.1, v => { e.lineWidth = v; }));
      f.appendChild(checkbox('fix second center', e.fixCenter, v => { e.fixCenter = v; }));
      f.appendChild(infoPanel('about this effect',
        'Two sets of concentric circles with offset centers produce moiré patterns that trace out conic sections. Small offsets create elliptical fringes; larger offsets reveal hyperbolic curves. Move the mouse to shift the second center and watch the interference pattern morph.'));
      controlsEl.appendChild(f);
    },
    render(w, h) {
      const e = state.effects[2];
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, w, h);
      const cx1 = w / 2, cy1 = h / 2;
      const cx2 = e.fixCenter ? w / 2 + 80 : state.mouse.x * w;
      const cy2 = e.fixCenter ? h / 2 : state.mouse.y * h;
      ctx.strokeStyle = '#000000';
      ctx.lineWidth = e.lineWidth;
      for (let i = 1; i <= e.rings; i++) {
        const r = i * e.period;
        ctx.beginPath(); ctx.arc(cx1, cy1, r, 0, Math.PI * 2); ctx.stroke();
        ctx.beginPath(); ctx.arc(cx2, cy2, r, 0, Math.PI * 2); ctx.stroke();
      }
    },
    formula() {
      const e = state.effects[2];
      const w = canvas2d.width, h = canvas2d.height;
      const cx2 = e.fixCenter ? w / 2 + 80 : state.mouse.x * w;
      const cy2 = e.fixCenter ? h / 2 : state.mouse.y * h;
      const dx = (cx2 - w / 2).toFixed(0);
      const dy = (cy2 - h / 2).toFixed(0);
      return `<span class="label">spacing</span><span class="value">${e.period}px</span>` +
        `<span class="label">Δx</span><span class="value">${dx}px</span>` +
        `<span class="label">Δy</span><span class="value">${dy}px</span>`;
    }
  },

  // Effect 3: Sine Grating (WebGL)
  {
    buildControls() {
      const e = state.effects[3];
      const f = document.createDocumentFragment();
      f.appendChild(slider('frequency f₁', e.f1, 5, 100, 0.5, v => { e.f1 = v; }));
      f.appendChild(slider('frequency f₂', e.f2, 5, 100, 0.5, v => { e.f2 = v; }));
      f.appendChild(slider('θ₁ (°)', e.theta1, 0, 180, 0.5, v => { e.theta1 = v; }));
      f.appendChild(slider('θ₂ (°)', e.theta2, 0, 180, 0.5, v => { e.theta2 = v; }));
      f.appendChild(slider('amplitude', e.amplitude, 0.1, 2, 0.05, v => { e.amplitude = v; }));
      f.appendChild(slider('zoom', e.zoom, 0.2, 5, 0.1, v => { e.zoom = v; }));
      f.appendChild(slider('rotation speed', e.rotSpeed, 0.1, 3, 0.1, v => { e.rotSpeed = v; }));
      f.appendChild(selectCtrl('color mode', ['grayscale', 'viridis', 'inferno'], e.colorMode, v => { e.colorMode = v; }));
      f.appendChild(checkbox('auto-rotate θ₂', e.autoRotate, v => { e.autoRotate = v; }));
      f.appendChild(infoPanel('about this effect',
        'Two 2D sine gratings are overlaid per-pixel on the GPU. The intensity is I(x,y) = sin(2π(x·cos(θ₁)+y·sin(θ₁))/f₁) + sin(2π(x·cos(θ₂)+y·sin(θ₂))/f₂). This creates smooth, continuous interference patterns. The false-color modes map intensity to scientific color scales (Viridis/Inferno).'));
      controlsEl.appendChild(f);
    },
    render(w, h) {
      if (!gl) return;
      const e = state.effects[3];
      gl.viewport(0, 0, w, h);
      gl.uniform2f(glUniforms.u_resolution, w, h);
      gl.uniform1f(glUniforms.u_f1, e.f1);
      gl.uniform1f(glUniforms.u_f2, e.f2);
      gl.uniform1f(glUniforms.u_theta1, e.theta1);
      gl.uniform1f(glUniforms.u_theta2, e.theta2);
      gl.uniform1f(glUniforms.u_amplitude, e.amplitude);
      gl.uniform1f(glUniforms.u_zoom, e.zoom);
      gl.uniform1f(glUniforms.u_time, performance.now() * 0.001);
      gl.uniform2f(glUniforms.u_mouse, state.mouse.x, state.mouse.y);
      gl.uniform1i(glUniforms.u_colormode, e.colorMode);
      gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
    },
    formula() {
      const e = state.effects[3];
      const delta = Math.abs(e.f1 - e.f2);
      const pm = delta > 0.01 ? (e.f1 * e.f2) / delta : Infinity;
      return `<span class="label">f₁</span><span class="value">${e.f1.toFixed(1)}</span>` +
        `<span class="label">f₂</span><span class="value">${e.f2.toFixed(1)}</span>` +
        `<span class="label">θ₁</span><span class="value">${e.theta1.toFixed(1)}°</span>` +
        `<span class="label">θ₂</span><span class="value">${e.theta2.toFixed(1)}°</span>` +
        `<span class="label">beat period =</span><span class="value">${pm === Infinity ? '∞' : pm.toFixed(1)}</span>`;
    },
    animate(dt) {
      const e = state.effects[3];
      if (e.autoRotate) {
        e.theta2 = (e.theta2 + dt * e.rotSpeed * 0.02) % 360;
        // Update slider if visible
        const sliders = controlsEl.querySelectorAll('input[type="range"]');
        if (sliders[3]) {
          sliders[3].value = e.theta2;
          sliders[3].previousElementSibling.querySelector('.val').textContent = e.theta2.toFixed(1);
        }
      }
    }
  }
];

// ─── Tab switching ──────────────────────────────────────────
function switchTab(i) {
  state.tab = i;
  document.querySelectorAll('.tab').forEach((t, idx) => t.classList.toggle('active', idx === i));
  controlsEl.innerHTML = '';

  // Reset button
  const btnRow = document.createElement('div');
  btnRow.className = 'btn-row';
  const resetBtn = document.createElement('button');
  resetBtn.className = 'btn';
  resetBtn.textContent = 'reset';
  resetBtn.addEventListener('click', resetEffect);
  btnRow.appendChild(resetBtn);
  controlsEl.appendChild(btnRow);

  effects[i].buildControls();

  // Show correct canvas
  if (i === 3) {
    canvas2d.style.display = 'none';
    canvasGL.style.display = 'block';
  } else {
    canvas2d.style.display = 'block';
    canvasGL.style.display = 'none';
  }
}

// ─── Reset ──────────────────────────────────────────────────
const defaults = JSON.parse(JSON.stringify(state.effects));

function resetEffect() {
  state.effects[state.tab] = JSON.parse(JSON.stringify(defaults[state.tab]));
  switchTab(state.tab);
}

// ─── Resize ─────────────────────────────────────────────────
function resize() {
  const w = wrap.clientWidth;
  const h = wrap.clientHeight;
  const dpr = window.devicePixelRatio || 1;
  canvas2d.width = w * dpr;
  canvas2d.height = h * dpr;
  canvasGL.width = w * dpr;
  canvasGL.height = h * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

// ─── Render loop ────────────────────────────────────────────
let lastTime = 0;

function frame(time) {
  const dt = time - lastTime;
  lastTime = time;

  resize();

  const w = wrap.clientWidth;
  const h = wrap.clientHeight;

  const eff = effects[state.tab];
  if (eff.animate) eff.animate(dt);
  eff.render(w, h);
  formulaBar.innerHTML = eff.formula();

  requestAnimationFrame(frame);
}

// ─── Mouse ──────────────────────────────────────────────────
wrap.addEventListener('mousemove', e => {
  const rect = wrap.getBoundingClientRect();
  state.mouse.x = (e.clientX - rect.left) / rect.width;
  state.mouse.y = (e.clientY - rect.top) / rect.height;
});

wrap.addEventListener('touchmove', e => {
  e.preventDefault();
  const rect = wrap.getBoundingClientRect();
  const t = e.touches[0];
  state.mouse.x = (t.clientX - rect.left) / rect.width;
  state.mouse.y = (t.clientY - rect.top) / rect.height;
}, { passive: false });

// ─── Keyboard ───────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
  if (e.key >= '1' && e.key <= '4') { switchTab(Number(e.key) - 1); return; }
  if (e.key === ' ') { e.preventDefault(); state.animating = !state.animating; toggleAnimations(); return; }
  if (e.key === 'r' || e.key === 'R') { resetEffect(); return; }
  if (e.key === 'f' || e.key === 'F') {
    if (document.fullscreenElement) document.exitFullscreen();
    else document.documentElement.requestFullscreen();
  }
});

function toggleAnimations() {
  if (state.tab === 1) state.effects[1].autoShift = state.animating;
  if (state.tab === 3) state.effects[3].autoRotate = state.animating;
  switchTab(state.tab);
}

// ─── Tab navigation ─────────────────────────────────────────
document.getElementById('tabs').addEventListener('click', e => {
  const tab = e.target.closest('.tab');
  if (tab) switchTab(Number(tab.dataset.tab));
});

// ─── Init ───────────────────────────────────────────────────
wrap.appendChild(canvas2d);
wrap.appendChild(canvasGL);
canvasGL.style.display = 'none';
initWebGL(canvasGL);
switchTab(0);
requestAnimationFrame(frame);
</script>
</body>
</html>
