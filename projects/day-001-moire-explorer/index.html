<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Moiré Explorer — Day 001</title>
<style>
:root {
  --bg: #0a0a0f;
  --bg-panel: #12121a;
  --bg-control: #1a1a28;
  --border: #2a2a3a;
  --text: #c8c8d4;
  --text-dim: #6a6a7a;
  --accent: #00d4aa;
  --accent-dim: #00a080;
  --accent-auto: #d4aa00;
  --mono: 'JetBrains Mono', 'Fira Code', 'SF Mono', monospace;
  --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }

body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  display: flex;
  flex-direction: column;
}

.tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
  background: var(--bg-panel);
  flex-shrink: 0;
  overflow-x: auto;
}

.tab {
  padding: 12px 16px;
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text-dim);
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  cursor: pointer;
  transition: color 0.2s, border-color 0.2s;
  white-space: nowrap;
}

.tab:hover { color: var(--text); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.tab kbd {
  font-size: 10px;
  padding: 1px 5px;
  border: 1px solid var(--border);
  border-radius: 3px;
  margin-left: 4px;
  color: var(--text-dim);
}

.main { display: flex; flex: 1; min-height: 0; }

.controls {
  width: 300px;
  flex-shrink: 0;
  background: var(--bg-panel);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  padding: 12px;
}

.control-group { margin-bottom: 12px; }

.control-group > .ctrl-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-dim);
  margin-bottom: 3px;
}

.ctrl-header .val { color: var(--accent); font-weight: 600; }
.ctrl-header .val.automated { color: var(--accent-auto); }

.ctrl-row {
  display: flex;
  align-items: center;
  gap: 6px;
}

.ctrl-row input[type="range"] { flex: 1; }

input[type="range"] {
  -webkit-appearance: none;
  width: 100%;
  height: 4px;
  background: var(--bg-control);
  border-radius: 2px;
  outline: none;
}

input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 12px; height: 12px;
  border-radius: 50%;
  background: var(--accent);
  cursor: pointer;
}

input[type="range"]::-moz-range-thumb {
  width: 12px; height: 12px;
  border-radius: 50%;
  background: var(--accent);
  border: none;
  cursor: pointer;
}

input[type="range"].auto-active::-webkit-slider-thumb { background: var(--accent-auto); }
input[type="range"].auto-active::-moz-range-thumb { background: var(--accent-auto); }

.auto-toggle {
  width: 20px; height: 20px;
  font-size: 11px;
  line-height: 20px;
  text-align: center;
  background: var(--bg-control);
  color: var(--text-dim);
  border: 1px solid var(--border);
  border-radius: 3px;
  cursor: pointer;
  flex-shrink: 0;
  padding: 0;
  font-family: var(--mono);
}

.auto-toggle.active { background: var(--accent-auto); color: var(--bg); border-color: var(--accent-auto); }

.auto-panel {
  display: none;
  padding: 8px;
  margin-top: 4px;
  background: rgba(212, 170, 0, 0.05);
  border: 1px solid rgba(212, 170, 0, 0.15);
  border-radius: 4px;
}

.auto-panel.open { display: block; }

.auto-panel .auto-row {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 4px;
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-dim);
}

.auto-panel .auto-row span:first-child {
  width: 32px;
  flex-shrink: 0;
}

.auto-panel .auto-row input[type="range"] { flex: 1; height: 3px; }
.auto-panel .auto-row .auto-val { width: 36px; text-align: right; color: var(--accent-auto); flex-shrink: 0; }

.auto-panel select {
  width: 100%;
  padding: 4px 6px;
  font-family: var(--mono);
  font-size: 10px;
  background: var(--bg-control);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 3px;
}

select {
  width: 100%;
  padding: 6px 8px;
  font-family: var(--mono);
  font-size: 11px;
  background: var(--bg-control);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 4px;
  cursor: pointer;
}

.checkbox-row {
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-dim);
  margin-bottom: 8px;
}

.btn {
  padding: 5px 10px;
  font-family: var(--mono);
  font-size: 11px;
  background: var(--bg-control);
  color: var(--accent);
  border: 1px solid var(--border);
  border-radius: 4px;
  cursor: pointer;
  transition: background 0.2s;
}

.btn:hover { background: var(--border); }
.btn-row { display: flex; gap: 6px; margin-bottom: 12px; }

.stop-btn {
  padding: 8px 20px;
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  border: none;
  border-radius: 4px;
  cursor: pointer;
  transition: background 0.15s, transform 0.1s;
}

.stop-btn:hover { transform: translateY(-1px); }

.stop-btn.running {
  background: #cc2244;
  color: #fff;
}

.stop-btn.paused {
  background: #22cc66;
  color: #000;
}

.legend {
  margin-top: 20px;
  padding-top: 12px;
  border-top: 1px solid var(--border);
}

.legend-title {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 8px;
}

.legend-item {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-dim);
  line-height: 2;
  display: flex;
  align-items: center;
  gap: 8px;
}

.legend-item kbd {
  padding: 1px 4px;
  border: 1px solid var(--border);
  border-radius: 3px;
  font-size: 10px;
}

.legend-icon {
  width: 18px;
  height: 18px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  font-size: 11px;
}

.auto-sample {
  background: var(--bg-control);
  border: 1px solid var(--border);
  border-radius: 3px;
  font-family: var(--mono);
  color: var(--text-dim);
}

.stop-sample {
  border-radius: 3px;
  font-size: 9px;
}

.stop-sample.running { background: #cc2244; color: #fff; }
.stop-sample.paused { background: #22cc66; color: #000; }

.legend-sep {
  height: 1px;
  background: var(--border);
  margin: 8px 0;
}

.epilepsy-warning {
  padding: 8px 16px;
  font-family: var(--mono);
  font-size: 11px;
  color: #cc8800;
  background: rgba(204, 136, 0, 0.08);
  border-bottom: 1px solid rgba(204, 136, 0, 0.2);
  text-align: center;
  flex-shrink: 0;
}

.viewport { flex: 1; display: flex; flex-direction: column; min-width: 0; }
.canvas-wrap { flex: 1; position: relative; min-height: 0; }
.canvas-wrap canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

.formula-bar {
  padding: 8px 16px;
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text);
  background: var(--bg-panel);
  border-top: 1px solid var(--border);
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
  flex-shrink: 0;
}

.formula-bar .label { color: var(--text-dim); }
.formula-bar .value { color: var(--accent); font-weight: 600; }

.info-toggle {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-dim);
  background: none;
  border: none;
  padding: 4px 0;
  cursor: pointer;
}

.info-toggle:hover { color: var(--accent); }
.info-text {
  font-size: 12px;
  line-height: 1.7;
  color: var(--text-dim);
  padding: 8px 0;
  border-top: 1px solid var(--border);
  display: none;
}

.info-text.open { display: block; }

.shortcuts {
  padding: 5px 16px;
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-dim);
  background: var(--bg-panel);
  border-top: 1px solid var(--border);
  display: flex;
  gap: 14px;
  flex-shrink: 0;
}

.shortcuts kbd {
  padding: 1px 4px;
  border: 1px solid var(--border);
  border-radius: 3px;
  margin-right: 3px;
}

@media (max-width: 700px) {
  .main { flex-direction: column; }
  .controls {
    width: 100%;
    max-height: 40vh;
    border-right: none;
    border-top: 1px solid var(--border);
    order: 2;
  }
  .viewport { order: 1; }
  .tab { padding: 8px 10px; font-size: 10px; }
  .tab kbd { display: none; }
  .shortcuts { display: none; }
}
</style>
</head>
<body>

<div class="epilepsy-warning">photosensitivity warning — this page contains rapidly changing high-contrast patterns</div>

<div class="tabs" id="tabs">
  <button class="tab active" data-tab="0">rotation <kbd>1</kbd></button>
  <button class="tab" data-tab="1">frequency <kbd>2</kbd></button>
  <button class="tab" data-tab="2">circles <kbd>3</kbd></button>
  <button class="tab" data-tab="3">sine (GL) <kbd>4</kbd></button>
  <button class="tab" data-tab="4">dot raster <kbd>5</kbd></button>
</div>

<div class="main">
  <div class="controls" id="controls"></div>
  <div class="viewport">
    <div class="canvas-wrap" id="canvasWrap"></div>
    <div class="formula-bar" id="formulaBar"></div>
  </div>
</div>

<div class="shortcuts">
  <span><kbd>1</kbd>–<kbd>5</kbd> switch</span>
  <span><kbd>space</kbd> play/pause</span>
  <span><kbd>R</kbd> reset</span>
  <span><kbd>F</kbd> fullscreen</span>
</div>

<script>
// ─── Automation system (LFO per slider) ─────────────────────
const automations = [];

class Automation {
  constructor(min, max, paramMin, paramMax, step) {
    this.active = false;
    this.lo = paramMin;
    this.hi = paramMax;
    this.rangeMin = min;
    this.rangeMax = max;
    this.speed = 1;
    this.wave = 'sine'; // sine, triangle, saw, random
    this.step = step;
    this.phase = 0;
    this._randVal = 0;
    this._randTimer = 0;
  }

  tick(dt) {
    if (!this.active) return null;
    this.phase += dt * this.speed * 0.001;
    let t;
    switch (this.wave) {
      case 'sine':
        t = (Math.sin(this.phase * Math.PI * 2) + 1) * 0.5;
        break;
      case 'triangle':
        t = 1 - Math.abs((this.phase % 1) * 2 - 1);
        break;
      case 'saw':
        t = this.phase % 1;
        break;
      case 'random':
        this._randTimer += dt * this.speed * 0.001;
        if (this._randTimer >= 1) { this._randVal = Math.random(); this._randTimer = 0; }
        t = this._randVal;
        break;
      default: t = 0;
    }
    const raw = this.lo + t * (this.hi - this.lo);
    return this.step >= 1 ? Math.round(raw) : Number(raw.toFixed(2));
  }
}

// ─── State ──────────────────────────────────────────────────
const state = {
  tab: 0,
  mouse: { x: 0.5, y: 0.5 },
  effects: [
    { theta: 5, period: 20, duty: 0.5, phase: 0, color1: '#000000', color2: '#000000', blend: 'normal' },
    { p1: 20, p2: 22, duty: 0.5, phase1: 0, phase2: 0, autoShift: false, speed: 1 },
    { period: 15, rings: 40, lineWidth: 1, offsetX: 80, offsetY: 0, mouseInfluence: true },
    { f1: 30, f2: 32, theta1: 0, theta2: 5, amplitude: 1, colorMode: 0, autoRotate: false, rotSpeed: 0.5, zoom: 1 },
    { spacing: 12, dotSize: 2, theta: 1.1, grid: 'hex', rings: 50 },
  ]
};

// ─── Canvas / WebGL ─────────────────────────────────────────
const wrap = document.getElementById('canvasWrap');
const canvas2d = document.createElement('canvas');
const canvasGL = document.createElement('canvas');
const ctx = canvas2d.getContext('2d');
let gl, glProgram, glUniforms;

function initWebGL(canvas) {
  gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
  if (!gl) return false;

  const vs = gl.createShader(gl.VERTEX_SHADER);
  gl.shaderSource(vs, `attribute vec2 a_pos; void main() { gl_Position = vec4(a_pos, 0, 1); }`);
  gl.compileShader(vs);

  const fs = gl.createShader(gl.FRAGMENT_SHADER);
  gl.shaderSource(fs, `
    precision highp float;
    uniform vec2 u_resolution;
    uniform float u_f1, u_f2, u_theta1, u_theta2;
    uniform float u_amplitude, u_time, u_zoom;
    uniform vec2 u_mouse;
    uniform int u_colormode;

    vec3 viridis(float t) {
      vec3 c0=vec3(.267,.004,.329); vec3 c1=vec3(.283,.141,.458);
      vec3 c2=vec3(.254,.265,.530); vec3 c3=vec3(.206,.372,.553);
      vec3 c4=vec3(.164,.471,.558); vec3 c5=vec3(.128,.567,.551);
      vec3 c6=vec3(.135,.659,.518); vec3 c7=vec3(.267,.749,.441);
      vec3 c8=vec3(.478,.821,.318); vec3 c9=vec3(.741,.873,.150);
      vec3 c10=vec3(.993,.906,.144);
      float s=t*10.; int i=int(s); float f=fract(s);
      if(i>=10) return c10;
      if(i==0) return mix(c0,c1,f); if(i==1) return mix(c1,c2,f);
      if(i==2) return mix(c2,c3,f); if(i==3) return mix(c3,c4,f);
      if(i==4) return mix(c4,c5,f); if(i==5) return mix(c5,c6,f);
      if(i==6) return mix(c6,c7,f); if(i==7) return mix(c7,c8,f);
      if(i==8) return mix(c8,c9,f); return mix(c9,c10,f);
    }

    vec3 inferno(float t) {
      vec3 c0=vec3(.001,.000,.014); vec3 c1=vec3(.106,.032,.245);
      vec3 c2=vec3(.280,.047,.398); vec3 c3=vec3(.453,.082,.398);
      vec3 c4=vec3(.610,.148,.338); vec3 c5=vec3(.748,.241,.253);
      vec3 c6=vec3(.854,.367,.159); vec3 c7=vec3(.929,.520,.055);
      vec3 c8=vec3(.961,.695,.039); vec3 c9=vec3(.950,.872,.227);
      vec3 c10=vec3(.988,.998,.645);
      float s=t*10.; int i=int(s); float f=fract(s);
      if(i>=10) return c10;
      if(i==0) return mix(c0,c1,f); if(i==1) return mix(c1,c2,f);
      if(i==2) return mix(c2,c3,f); if(i==3) return mix(c3,c4,f);
      if(i==4) return mix(c4,c5,f); if(i==5) return mix(c5,c6,f);
      if(i==6) return mix(c6,c7,f); if(i==7) return mix(c7,c8,f);
      if(i==8) return mix(c8,c9,f); return mix(c9,c10,f);
    }

    void main() {
      vec2 uv = (gl_FragCoord.xy - u_resolution * 0.5) / u_zoom;
      uv += (u_mouse - 0.5) * u_resolution * 0.3;
      float r1 = u_theta1 * 3.14159265 / 180.0;
      float r2 = u_theta2 * 3.14159265 / 180.0;
      float v1 = sin(6.28318 * (uv.x*cos(r1)+uv.y*sin(r1)) / u_f1);
      float v2 = sin(6.28318 * (uv.x*cos(r2)+uv.y*sin(r2)) / u_f2);
      float val = (v1+v2) * 0.5 * u_amplitude;
      float t = val * 0.5 + 0.5;
      vec3 col;
      if(u_colormode==0) col=vec3(t);
      else if(u_colormode==1) col=viridis(t);
      else col=inferno(t);
      gl_FragColor = vec4(col,1.0);
    }
  `);
  gl.compileShader(fs);

  glProgram = gl.createProgram();
  gl.attachShader(glProgram, vs);
  gl.attachShader(glProgram, fs);
  gl.linkProgram(glProgram);
  gl.useProgram(glProgram);

  const buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,1,-1,-1,1,1,1]), gl.STATIC_DRAW);
  const aPos = gl.getAttribLocation(glProgram, 'a_pos');
  gl.enableVertexAttribArray(aPos);
  gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

  glUniforms = {};
  ['u_resolution','u_f1','u_f2','u_theta1','u_theta2','u_amplitude','u_time','u_zoom','u_mouse','u_colormode']
    .forEach(n => glUniforms[n] = gl.getUniformLocation(glProgram, n));
  return true;
}

// ─── Controls ───────────────────────────────────────────────
const controlsEl = document.getElementById('controls');
const formulaBar = document.getElementById('formulaBar');

function slider(label, value, min, max, step, onChange) {
  const auto = new Automation(min, max, min, max, step);
  automations.push(auto);

  const div = document.createElement('div');
  div.className = 'control-group';

  // Header
  const header = document.createElement('div');
  header.className = 'ctrl-header';
  const valSpan = document.createElement('span');
  valSpan.className = 'val';
  const prec = step < 1 ? 1 : 0;
  valSpan.textContent = Number(value).toFixed(prec);
  header.innerHTML = `<span>${label}</span>`;
  header.appendChild(valSpan);

  // Slider row
  const row = document.createElement('div');
  row.className = 'ctrl-row';
  const input = document.createElement('input');
  input.type = 'range';
  input.min = min; input.max = max; input.step = step; input.value = value;
  input.addEventListener('input', () => {
    valSpan.textContent = Number(input.value).toFixed(prec);
    valSpan.classList.remove('automated');
    onChange(Number(input.value));
  });

  const autoBtn = document.createElement('button');
  autoBtn.className = 'auto-toggle';
  autoBtn.textContent = '~';
  autoBtn.title = 'automation';

  row.appendChild(input);
  row.appendChild(autoBtn);

  // Automation panel
  const panel = document.createElement('div');
  panel.className = 'auto-panel';

  function autoRow(name, val, lo, hi, s, onCh) {
    const r = document.createElement('div');
    r.className = 'auto-row';
    const lbl = document.createElement('span');
    lbl.textContent = name;
    const inp = document.createElement('input');
    inp.type = 'range'; inp.min = lo; inp.max = hi; inp.step = s; inp.value = val;
    const v = document.createElement('span');
    v.className = 'auto-val';
    v.textContent = Number(val).toFixed(s < 1 ? 1 : 0);
    inp.addEventListener('input', () => {
      v.textContent = Number(inp.value).toFixed(s < 1 ? 1 : 0);
      onCh(Number(inp.value));
    });
    r.appendChild(lbl); r.appendChild(inp); r.appendChild(v);
    return r;
  }

  panel.appendChild(autoRow('min', min, min, max, step, v => { auto.lo = v; }));
  panel.appendChild(autoRow('max', max, min, max, step, v => { auto.hi = v; }));
  panel.appendChild(autoRow('spd', 1, 0.05, 5, 0.05, v => { auto.speed = v; }));

  const waveRow = document.createElement('div');
  waveRow.className = 'auto-row';
  const waveLbl = document.createElement('span');
  waveLbl.textContent = 'wave';
  const waveSel = document.createElement('select');
  ['sine', 'triangle', 'saw', 'random'].forEach(w => {
    const o = document.createElement('option');
    o.value = w; o.textContent = w;
    waveSel.appendChild(o);
  });
  waveSel.addEventListener('change', () => { auto.wave = waveSel.value; });
  waveRow.appendChild(waveLbl); waveRow.appendChild(waveSel);
  panel.appendChild(waveRow);

  autoBtn.addEventListener('click', () => {
    auto.active = !auto.active;
    autoBtn.classList.toggle('active', auto.active);
    panel.classList.toggle('open', auto.active);
    input.classList.toggle('auto-active', auto.active);
    if (!auto.active) valSpan.classList.remove('automated');
  });

  // Store refs for render-loop updates
  auto._input = input;
  auto._valSpan = valSpan;
  auto._onChange = onChange;
  auto._prec = prec;

  div.appendChild(header);
  div.appendChild(row);
  div.appendChild(panel);
  return div;
}

function selectCtrl(label, options, value, onChange) {
  const div = document.createElement('div');
  div.className = 'control-group';
  const lbl = document.createElement('div');
  lbl.className = 'ctrl-header';
  lbl.innerHTML = `<span>${label}</span>`;
  const sel = document.createElement('select');
  options.forEach((opt, i) => {
    const o = document.createElement('option');
    o.value = i; o.textContent = opt;
    if (i === value) o.selected = true;
    sel.appendChild(o);
  });
  sel.addEventListener('change', () => onChange(Number(sel.value)));
  div.appendChild(lbl); div.appendChild(sel);
  return div;
}

function checkbox(label, checked, onChange) {
  const div = document.createElement('div');
  div.className = 'checkbox-row';
  const input = document.createElement('input');
  input.type = 'checkbox'; input.checked = checked;
  input.addEventListener('change', () => onChange(input.checked));
  const span = document.createElement('span');
  span.textContent = label;
  div.appendChild(input); div.appendChild(span);
  return div;
}

function infoPanel(title, text) {
  const w = document.createElement('div');
  const btn = document.createElement('button');
  btn.className = 'info-toggle';
  btn.textContent = `▸ ${title}`;
  const content = document.createElement('div');
  content.className = 'info-text';
  content.textContent = text;
  btn.addEventListener('click', () => {
    content.classList.toggle('open');
    btn.textContent = content.classList.contains('open') ? `▾ ${title}` : `▸ ${title}`;
  });
  w.appendChild(btn); w.appendChild(content);
  return w;
}

// ─── Drawing helpers ────────────────────────────────────────
function drawLineGrating(ctx, w, h, period, duty, phase, angle, color) {
  ctx.save();
  ctx.translate(w / 2, h / 2);
  ctx.rotate(angle);
  const lineW = period * duty;
  const diag = Math.sqrt(w * w + h * h);
  const n = Math.ceil(diag / period) + 1;
  ctx.fillStyle = color;
  for (let i = -n; i <= n; i++) {
    ctx.fillRect(i * period + phase * period - lineW / 2, -diag / 2, lineW, diag);
  }
  ctx.restore();
}

function drawDotGrid(ctx, w, h, spacing, dotSize, angle, type) {
  ctx.save();
  ctx.translate(w / 2, h / 2);
  ctx.rotate(angle);
  const diag = Math.sqrt(w * w + h * h);
  const n = Math.ceil(diag / spacing) + 2;
  ctx.fillStyle = '#000000';
  const isHex = type === 'hex';
  for (let row = -n; row <= n; row++) {
    for (let col = -n; col <= n; col++) {
      let x = col * spacing;
      let y = row * spacing * (isHex ? 0.866 : 1);
      if (isHex && row % 2 !== 0) x += spacing * 0.5;
      ctx.beginPath();
      ctx.arc(x, y, dotSize, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  ctx.restore();
}

// ─── Effects ────────────────────────────────────────────────
const effects = [
  // 0: Rotation
  {
    buildControls() {
      const e = state.effects[0];
      const f = document.createDocumentFragment();
      f.appendChild(slider('θ angle (°)', e.theta, 0.1, 45, 0.1, v => { e.theta = v; }));
      f.appendChild(slider('period (px)', e.period, 5, 80, 1, v => { e.period = v; }));
      f.appendChild(slider('duty cycle', e.duty, 0.1, 0.9, 0.01, v => { e.duty = v; }));
      f.appendChild(slider('phase offset', e.phase, 0, 1, 0.01, v => { e.phase = v; }));
      f.appendChild(infoPanel('about this effect',
        'Two identical line gratings overlaid with a relative rotation angle θ. The moiré period is p/(2·sin(θ/2)). At small angles, tiny rotations create dramatically large patterns — angular amplification used in precision measurement.'));
      controlsEl.appendChild(f);
    },
    render(w, h) {
      const e = state.effects[0];
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, w, h);
      drawLineGrating(ctx, w, h, e.period, e.duty, 0, 0, e.color1);
      ctx.globalCompositeOperation = 'multiply';
      drawLineGrating(ctx, w, h, e.period, e.duty, e.phase, e.theta * Math.PI / 180, e.color2);
      ctx.globalCompositeOperation = 'source-over';
    },
    formula() {
      const e = state.effects[0];
      const sinH = Math.sin(e.theta * Math.PI / 360);
      const pm = sinH > 0.0001 ? e.period / (2 * sinH) : Infinity;
      return `<span class="label">p</span><span class="value">${e.period}px</span>` +
        `<span class="label">θ</span><span class="value">${e.theta.toFixed(1)}°</span>` +
        `<span class="label">p<sub>moiré</sub> = p/(2·sin(θ/2)) =</span><span class="value">${pm === Infinity ? '∞' : pm.toFixed(1) + 'px'}</span>`;
    }
  },

  // 1: Frequency Beating
  {
    buildControls() {
      const e = state.effects[1];
      const f = document.createDocumentFragment();
      f.appendChild(slider('p₁ (px)', e.p1, 5, 100, 0.5, v => { e.p1 = v; }));
      f.appendChild(slider('p₂ (px)', e.p2, 5, 100, 0.5, v => { e.p2 = v; }));
      f.appendChild(slider('duty cycle', e.duty, 0.1, 0.9, 0.01, v => { e.duty = v; }));
      f.appendChild(slider('shift speed', e.speed, 0.1, 5, 0.1, v => { e.speed = v; }));
      f.appendChild(checkbox('auto-shift', e.autoShift, v => { e.autoShift = v; }));
      f.appendChild(infoPanel('about this effect',
        'Two parallel gratings with slightly different periods. The moiré period is (p₁·p₂)/|p₁−p₂|. As periods approach each other, the moiré grows infinitely — like two detuned tuning forks creating audible beating.'));
      controlsEl.appendChild(f);
    },
    render(w, h) {
      const e = state.effects[1];
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, w, h);
      drawLineGrating(ctx, w, h, e.p1, e.duty, e.phase1, 0, '#000000');
      ctx.globalCompositeOperation = 'multiply';
      drawLineGrating(ctx, w, h, e.p2, e.duty, e.phase2, 0, '#000000');
      ctx.globalCompositeOperation = 'source-over';
    },
    formula() {
      const e = state.effects[1];
      const d = Math.abs(e.p1 - e.p2);
      const pm = d > 0.01 ? (e.p1 * e.p2) / d : Infinity;
      return `<span class="label">p₁</span><span class="value">${e.p1.toFixed(1)}px</span>` +
        `<span class="label">p₂</span><span class="value">${e.p2.toFixed(1)}px</span>` +
        `<span class="label">Δ</span><span class="value">${d.toFixed(1)}px</span>` +
        `<span class="label">p<sub>moiré</sub> = (p₁·p₂)/|p₁−p₂| =</span><span class="value">${pm === Infinity ? '∞' : pm.toFixed(1) + 'px'}</span>`;
    },
    animate(dt) {
      const e = state.effects[1];
      if (e.autoShift) e.phase2 = (e.phase2 + dt * e.speed * 0.001) % 1;
    }
  },

  // 2: Concentric Circles
  {
    buildControls() {
      const e = state.effects[2];
      const f = document.createDocumentFragment();
      f.appendChild(slider('ring spacing (px)', e.period, 5, 60, 1, v => { e.period = v; }));
      f.appendChild(slider('ring count', e.rings, 5, 80, 1, v => { e.rings = v; }));
      f.appendChild(slider('line width', e.lineWidth, 0.5, 4, 0.1, v => { e.lineWidth = v; }));
      f.appendChild(slider('offset x (px)', e.offsetX, -300, 300, 1, v => { e.offsetX = v; }));
      f.appendChild(slider('offset y (px)', e.offsetY, -300, 300, 1, v => { e.offsetY = v; }));
      f.appendChild(checkbox('mouse modifies offset', e.mouseInfluence, v => { e.mouseInfluence = v; }));
      f.appendChild(infoPanel('about this effect',
        'Two sets of concentric circles with offset centers produce conic section fringes. Small offsets → ellipses; larger offsets → hyperbolic curves. Use the offset sliders or move the mouse over the canvas to shift the second center.'));
      controlsEl.appendChild(f);
    },
    _getOffset(w, h) {
      const e = state.effects[2];
      let ox = e.offsetX, oy = e.offsetY;
      if (e.mouseInfluence) {
        ox += (state.mouse.x - 0.5) * w * 0.5;
        oy += (state.mouse.y - 0.5) * h * 0.5;
      }
      return [ox, oy];
    },
    render(w, h) {
      const e = state.effects[2];
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, w, h);
      const cx1 = w / 2, cy1 = h / 2;
      const [ox, oy] = this._getOffset(w, h);
      const cx2 = cx1 + ox, cy2 = cy1 + oy;
      ctx.strokeStyle = '#000000';
      ctx.lineWidth = e.lineWidth;
      for (let i = 1; i <= e.rings; i++) {
        const r = i * e.period;
        ctx.beginPath(); ctx.arc(cx1, cy1, r, 0, Math.PI * 2); ctx.stroke();
        ctx.beginPath(); ctx.arc(cx2, cy2, r, 0, Math.PI * 2); ctx.stroke();
      }
    },
    formula() {
      const e = state.effects[2];
      const w = wrap.clientWidth, h = wrap.clientHeight;
      const [ox, oy] = this._getOffset(w, h);
      return `<span class="label">spacing</span><span class="value">${e.period}px</span>` +
        `<span class="label">Δx</span><span class="value">${ox.toFixed(0)}px</span>` +
        `<span class="label">Δy</span><span class="value">${oy.toFixed(0)}px</span>`;
    }
  },

  // 3: Sine Grating (WebGL)
  {
    buildControls() {
      const e = state.effects[3];
      const f = document.createDocumentFragment();
      f.appendChild(slider('frequency f₁', e.f1, 5, 100, 0.5, v => { e.f1 = v; }));
      f.appendChild(slider('frequency f₂', e.f2, 5, 100, 0.5, v => { e.f2 = v; }));
      f.appendChild(slider('θ₁ (°)', e.theta1, 0, 180, 0.5, v => { e.theta1 = v; }));
      f.appendChild(slider('θ₂ (°)', e.theta2, 0, 180, 0.5, v => { e.theta2 = v; }));
      f.appendChild(slider('amplitude', e.amplitude, 0.1, 2, 0.05, v => { e.amplitude = v; }));
      f.appendChild(slider('zoom', e.zoom, 0.2, 5, 0.1, v => { e.zoom = v; }));
      f.appendChild(slider('rotation speed', e.rotSpeed, 0.1, 3, 0.1, v => { e.rotSpeed = v; }));
      f.appendChild(selectCtrl('color mode', ['grayscale', 'viridis', 'inferno'], e.colorMode, v => { e.colorMode = v; }));
      f.appendChild(checkbox('auto-rotate θ₂', e.autoRotate, v => { e.autoRotate = v; }));
      f.appendChild(infoPanel('about this effect',
        'Two 2D sine gratings overlaid per-pixel on the GPU. I(x,y) = sin(2π(x·cos(θ₁)+y·sin(θ₁))/f₁) + sin(2π(x·cos(θ₂)+y·sin(θ₂))/f₂). False-color modes map intensity to scientific color scales.'));
      controlsEl.appendChild(f);
    },
    render(w, h) {
      if (!gl) return;
      const e = state.effects[3];
      gl.viewport(0, 0, w, h);
      gl.uniform2f(glUniforms.u_resolution, w, h);
      gl.uniform1f(glUniforms.u_f1, e.f1);
      gl.uniform1f(glUniforms.u_f2, e.f2);
      gl.uniform1f(glUniforms.u_theta1, e.theta1);
      gl.uniform1f(glUniforms.u_theta2, e.theta2);
      gl.uniform1f(glUniforms.u_amplitude, e.amplitude);
      gl.uniform1f(glUniforms.u_zoom, e.zoom);
      gl.uniform1f(glUniforms.u_time, performance.now() * 0.001);
      gl.uniform2f(glUniforms.u_mouse, state.mouse.x, state.mouse.y);
      gl.uniform1i(glUniforms.u_colormode, e.colorMode);
      gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
    },
    formula() {
      const e = state.effects[3];
      const d = Math.abs(e.f1 - e.f2);
      const pm = d > 0.01 ? (e.f1 * e.f2) / d : Infinity;
      return `<span class="label">f₁</span><span class="value">${e.f1.toFixed(1)}</span>` +
        `<span class="label">f₂</span><span class="value">${e.f2.toFixed(1)}</span>` +
        `<span class="label">θ₁</span><span class="value">${e.theta1.toFixed(1)}°</span>` +
        `<span class="label">θ₂</span><span class="value">${e.theta2.toFixed(1)}°</span>` +
        `<span class="label">beat =</span><span class="value">${pm === Infinity ? '∞' : pm.toFixed(1)}</span>`;
    },
    animate(dt) {
      const e = state.effects[3];
      if (e.autoRotate) {
        e.theta2 = (e.theta2 + dt * e.rotSpeed * 0.02) % 360;
      }
    }
  },

  // 4: Dot Raster
  {
    buildControls() {
      const e = state.effects[4];
      const f = document.createDocumentFragment();
      f.appendChild(slider('spacing (px)', e.spacing, 4, 40, 1, v => { e.spacing = v; }));
      f.appendChild(slider('dot size (px)', e.dotSize, 0.5, 8, 0.25, v => { e.dotSize = v; }));
      f.appendChild(slider('θ angle (°)', e.theta, 0, 30, 0.05, v => { e.theta = v; }));
      f.appendChild(slider('density', e.rings, 10, 80, 1, v => { e.rings = v; }));
      f.appendChild(selectCtrl('grid type', ['hexagonal', 'square'], e.grid === 'hex' ? 0 : 1, v => { e.grid = v === 0 ? 'hex' : 'square'; }));

      const magicBtn = document.createElement('button');
      magicBtn.className = 'btn';
      magicBtn.textContent = e.grid === 'hex' ? 'magic angle (1.1°)' : 'magic angle (0°)';
      magicBtn.style.marginBottom = '12px';
      magicBtn.addEventListener('click', () => {
        e.theta = e.grid === 'hex' ? 1.1 : 0;
        switchTab(state.tab);
      });
      f.appendChild(magicBtn);

      f.appendChild(infoPanel('about this effect',
        'Two overlapping dot rasters with a small relative rotation. Hexagonal grids produce a special "magic angle" at ~1.1° where the moiré pattern forms a large-scale hexagonal superstructure — the same principle behind magic-angle graphene (twisted bilayer graphene). Square grids show classical rotational moiré.'));
      controlsEl.appendChild(f);
    },
    render(w, h) {
      const e = state.effects[4];
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, w, h);
      drawDotGrid(ctx, w, h, e.spacing, e.dotSize, 0, e.grid);
      ctx.globalCompositeOperation = 'multiply';
      drawDotGrid(ctx, w, h, e.spacing, e.dotSize, e.theta * Math.PI / 180, e.grid);
      ctx.globalCompositeOperation = 'source-over';
    },
    formula() {
      const e = state.effects[4];
      const thetaRad = e.theta * Math.PI / 180;
      const sinH = Math.sin(thetaRad / 2);
      const pm = sinH > 0.0001 ? e.spacing / (2 * sinH) : Infinity;
      const isMagic = e.grid === 'hex' && Math.abs(e.theta - 1.1) < 0.1;
      return `<span class="label">grid</span><span class="value">${e.grid}</span>` +
        `<span class="label">θ</span><span class="value">${e.theta.toFixed(2)}°${isMagic ? ' ★' : ''}</span>` +
        `<span class="label">p<sub>moiré</sub> =</span><span class="value">${pm === Infinity ? '∞' : pm.toFixed(1) + 'px'}</span>`;
    }
  }
];

// ─── Pause state ────────────────────────────────────────────
let paused = false;

function togglePause() {
  paused = !paused;
  updateStopBtn();
}

function updateStopBtn() {
  const btn = document.getElementById('stopBtn');
  if (!btn) return;
  btn.className = paused ? 'stop-btn paused' : 'stop-btn running';
  btn.textContent = paused ? 'continue' : 'stop';
}

// ─── Default automation presets per effect ───────────────────
// Activates 1-2 gentle automations when a tab loads.
// [sliderIndex, lo, hi, speed, wave]
const autoPresets = {
  0: [[0, 1, 12, 0.15, 'sine']],                    // θ: 1°–12°, slow sine
  1: [[1, 17, 26, 0.12, 'triangle']],                // p₂: 17–26px
  2: [[3, -120, 120, 0.08, 'sine']],                   // offset x: -120–120px
  3: [[3, 0, 40, 0.08, 'sine']],                     // θ₂: 0–40°
  4: [[2, 0.3, 4, 0.1, 'sine']],                     // θ: 0.3°–4°
};

function applyPresets(tabIndex) {
  const presets = autoPresets[tabIndex] || [];
  for (const [idx, lo, hi, speed, wave] of presets) {
    const auto = automations[idx];
    if (!auto) continue;
    auto.active = true;
    auto.lo = lo;
    auto.hi = hi;
    auto.speed = speed;
    auto.wave = wave;
    // Update UI
    auto._input?.classList.add('auto-active');
    // Find and update the auto-toggle button and panel
    const group = auto._input?.closest('.control-group');
    if (group) {
      const toggle = group.querySelector('.auto-toggle');
      const panel = group.querySelector('.auto-panel');
      if (toggle) toggle.classList.add('active');
      if (panel) {
        panel.classList.add('open');
        // Update min/max/speed sliders in panel
        const panelSliders = panel.querySelectorAll('input[type="range"]');
        const panelVals = panel.querySelectorAll('.auto-val');
        if (panelSliders[0]) { panelSliders[0].value = lo; panelVals[0].textContent = lo; }
        if (panelSliders[1]) { panelSliders[1].value = hi; panelVals[1].textContent = hi; }
        if (panelSliders[2]) { panelSliders[2].value = speed; panelVals[2].textContent = speed; }
        const waveSel = panel.querySelector('select');
        if (waveSel) waveSel.value = wave;
      }
    }
  }
}

// ─── Tab switching ──────────────────────────────────────────
function switchTab(i) {
  state.tab = i;
  automations.length = 0;
  document.querySelectorAll('.tab').forEach((t, idx) => t.classList.toggle('active', idx === i));
  controlsEl.innerHTML = '';

  const btnRow = document.createElement('div');
  btnRow.className = 'btn-row';

  const stopBtn = document.createElement('button');
  stopBtn.id = 'stopBtn';
  stopBtn.className = paused ? 'stop-btn paused' : 'stop-btn running';
  stopBtn.textContent = paused ? 'continue' : 'stop';
  stopBtn.addEventListener('click', togglePause);
  btnRow.appendChild(stopBtn);

  const resetBtn = document.createElement('button');
  resetBtn.className = 'btn'; resetBtn.textContent = 'reset';
  resetBtn.addEventListener('click', resetEffect);
  btnRow.appendChild(resetBtn);

  controlsEl.appendChild(btnRow);

  effects[i].buildControls();
  applyPresets(i);

  // Legend
  const legend = document.createElement('div');
  legend.className = 'legend';
  legend.innerHTML = `
    <div class="legend-title">legend</div>
    <div class="legend-item"><span class="legend-icon auto-sample">~</span> automation — oscillate parameter automatically</div>
    <div class="legend-item"><span class="legend-icon" style="color:var(--accent-auto)">●</span> yellow = automation active</div>
    <div class="legend-item"><span class="legend-icon stop-sample running">■</span> stop — halt all animations</div>
    <div class="legend-item"><span class="legend-icon stop-sample paused">▶</span> continue — resume animations</div>
    <div class="legend-item"><span class="legend-icon">▸</span> expand info panel</div>
    <div class="legend-sep"></div>
    <div class="legend-item"><kbd>1</kbd>–<kbd>5</kbd> switch effect</div>
    <div class="legend-item"><kbd>space</kbd> stop / continue</div>
    <div class="legend-item"><kbd>R</kbd> reset to defaults</div>
    <div class="legend-item"><kbd>F</kbd> fullscreen</div>
  `;
  controlsEl.appendChild(legend);

  if (i === 3) {
    canvas2d.style.display = 'none';
    canvasGL.style.display = 'block';
  } else {
    canvas2d.style.display = 'block';
    canvasGL.style.display = 'none';
  }
}

const defaults = JSON.parse(JSON.stringify(state.effects));

function resetEffect() {
  state.effects[state.tab] = JSON.parse(JSON.stringify(defaults[state.tab]));
  switchTab(state.tab);
}

// ─── Resize ─────────────────────────────────────────────────
function resize() {
  const w = wrap.clientWidth, h = wrap.clientHeight;
  const dpr = window.devicePixelRatio || 1;
  canvas2d.width = w * dpr; canvas2d.height = h * dpr;
  canvasGL.width = w * dpr; canvasGL.height = h * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

// ─── Render loop ────────────────────────────────────────────
let lastTime = 0;

function frame(time) {
  const dt = time - lastTime;
  lastTime = time;
  resize();

  if (!paused) {
    // Tick automations
    for (const auto of automations) {
      const val = auto.tick(dt);
      if (val !== null) {
        auto._onChange(val);
        auto._input.value = val;
        auto._valSpan.textContent = val.toFixed(auto._prec);
        auto._valSpan.classList.add('automated');
      }
    }

    const eff = effects[state.tab];
    if (eff.animate) eff.animate(dt);
  }

  // Always render (so manual slider changes show even when paused)
  const w = wrap.clientWidth, h = wrap.clientHeight;
  effects[state.tab].render(w, h);
  formulaBar.innerHTML = effects[state.tab].formula();

  requestAnimationFrame(frame);
}

// ─── Mouse ──────────────────────────────────────────────────
wrap.addEventListener('mousemove', e => {
  const r = wrap.getBoundingClientRect();
  state.mouse.x = (e.clientX - r.left) / r.width;
  state.mouse.y = (e.clientY - r.top) / r.height;
});

wrap.addEventListener('touchmove', e => {
  e.preventDefault();
  const r = wrap.getBoundingClientRect();
  state.mouse.x = (e.touches[0].clientX - r.left) / r.width;
  state.mouse.y = (e.touches[0].clientY - r.top) / r.height;
}, { passive: false });

// ─── Keyboard ───────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
  if (e.key >= '1' && e.key <= '5') { switchTab(Number(e.key) - 1); return; }
  if (e.key === ' ') { e.preventDefault(); togglePause(); return; }
  if (e.key === 'r' || e.key === 'R') { resetEffect(); return; }
  if (e.key === 'f' || e.key === 'F') {
    if (document.fullscreenElement) document.exitFullscreen();
    else document.documentElement.requestFullscreen();
  }
});

document.getElementById('tabs').addEventListener('click', e => {
  const tab = e.target.closest('.tab');
  if (tab) switchTab(Number(tab.dataset.tab));
});

// ─── Init ───────────────────────────────────────────────────
wrap.appendChild(canvas2d);
wrap.appendChild(canvasGL);
canvasGL.style.display = 'none';
initWebGL(canvasGL);
switchTab(0);
requestAnimationFrame(frame);
</script>
</body>
